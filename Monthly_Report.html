<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="color-scheme" content="dark light">
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Report</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .widget-container {
            position: relative;
            width: 680px;
            height: 480px;
            background: linear-gradient(180deg, rgba(224, 242, 254, 0.25) 0%, rgba(240, 249, 255, 0.15) 100%);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(224, 242, 254, 0.4);
            box-shadow: 0 8px 32px rgba(186, 230, 253, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #e2e8f0;
        }

        .header-section {
            background: rgba(255, 255, 255, 0.12);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 24px 10px;
            backdrop-filter: blur(5px);
            flex-shrink: 0;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px 24px;
        }

        /* 섹션 */
        .section-block { margin-bottom: 20px; }
        .section-block:last-child { margin-bottom: 0; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(186, 230, 253, 0.15);
            cursor: pointer;
            user-select: none;
        }
        .section-header:hover { border-bottom-color: rgba(186, 230, 253, 0.3); }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: rgba(226, 232, 240, 0.95);
            letter-spacing: -0.3px;
        }
        .section-num {
            font-size: 13px;
            color: rgba(125, 211, 252, 0.5);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* 키워드 태그 */
        .keyword-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .keyword-tag {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #7dd3fc;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.2);
            letter-spacing: -0.2px;
        }

        /* 핵심 문장 */
        .highlight-sentence {
            font-size: 14px;
            font-weight: 600;
            color: #7dd3fc;
            line-height: 1.7;
            margin-bottom: 14px;
            padding-left: 10px;
            border-left: 2.5px solid rgba(56, 189, 248, 0.4);
        }

        /* 소제목 */
        .sub-heading {
            font-size: 14.5px;
            font-weight: 700;
            color: rgba(226, 232, 240, 0.92);
            margin-top: 14px;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        /* 본문 */
        .body-text {
            font-size: 13.5px;
            line-height: 1.85;
            color: rgba(226, 232, 240, 0.75);
            word-break: keep-all;
        }

        .collapsed .section-inner { display: none; }
        .collapsed .section-header { border-bottom-color: transparent; margin-bottom: 4px; padding-bottom: 4px; }
        .collapse-icon { transition: transform 0.2s ease; font-size: 10px; color: rgba(148, 163, 184, 0.5); }
        .collapsed .collapse-icon { transform: rotate(-90deg); }

        /* 버튼/입력 */
        .generate-btn {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.35) 0%, rgba(125, 211, 252, 0.2) 100%);
            border: 1px solid rgba(125, 211, 252, 0.45);
            border-radius: 10px;
            padding: 7px 18px;
            color: #e0f2fe;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
        }
        .generate-btn:hover {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.5) 0%, rgba(125, 211, 252, 0.35) 100%);
            border-color: rgba(125, 211, 252, 0.7);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(56, 189, 248, 0.2);
        }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .select-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(186, 230, 253, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            padding: 5px 8px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            text-align: center;
        }
        .select-input:focus { border-color: rgba(125, 211, 252, 0.5); }
        .select-input option { background: #1e293b; color: #e2e8f0; }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 500;
            background: rgba(125, 211, 252, 0.1);
            border: 1px solid rgba(125, 211, 252, 0.15);
            color: rgba(186, 230, 253, 0.85);
        }

        .progress-track { width: 100%; height: 2.5px; background: rgba(125,211,252,0.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, rgba(56,189,248,0.6), rgba(125,211,252,0.8)); border-radius: 2px; transition: width 0.5s ease; }

        .toast-message {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
            border: 1px solid rgba(186,230,253,0.5); color: #0ea5e9;
            padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
            animation: toastIn 0.3s ease-out; z-index: 50; white-space: nowrap;
        }

        @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .loading-shimmer { background: linear-gradient(90deg, rgba(125,211,252,0.05) 25%, rgba(125,211,252,0.12) 50%, rgba(125,211,252,0.05) 75%); background-size: 200% 100%; animation: shimmer 2s ease-in-out infinite; border-radius: 8px; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width:16px; height:16px; border: 2px solid rgba(125,211,252,0.2); border-top-color: rgba(125,211,252,0.8); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WORKER_URL = "https://monthly-report-walker.moonkelly601.workers.dev";

        const SECTION_ORDER = [
            { key: 'A_StudyTime', num: '01', label: '공부시간 분석' },
            { key: 'B_Pattern',   num: '02', label: '행동패턴 분석' },
            { key: 'C_Event',     num: '03', label: '이벤트 피드백' },
            { key: 'D_Weekly',    num: '04', label: '주별 성취도' },
            { key: 'F_Emotion',   num: '05', label: '정서 · 체력 흐름' },
            { key: 'E_Overall',   num: '06', label: '종합 피드백' },
        ];

        const Icons = {
            ChevronDown: ({className}) => <svg className={className} width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
            Report: ({className}) => <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
            Flame: ({className}) => <svg className={className} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.1.2-2.2.6-3.3a7 7 0 0 0 3 3.3z"/></svg>,
            Calendar: ({className}) => <svg className={className} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
        };

        // 구조화 텍스트 파싱
        const parseStructured = (text) => {
            if (!text) return { keywords: [], highlight: '', blocks: [{ type: 'body', text }] };

            let keywords = [];
            let highlight = '';
            const blocks = [];

            const lines = text.split('\n');
            let currentBody = [];

            const flushBody = () => {
                const t = currentBody.join('\n').trim();
                if (t) blocks.push({ type: 'body', text: t });
                currentBody = [];
            };

            for (const line of lines) {
                const trimmed = line.trim();

                // [키워드] 파싱
                const kwMatch = trimmed.match(/^\[키워드\]\s*(.+)/);
                if (kwMatch) {
                    keywords = kwMatch[1].split(/[,，]/).map(k => k.trim()).filter(Boolean);
                    continue;
                }

                // [핵심] 파싱
                const hlMatch = trimmed.match(/^\[핵심\]\s*(.+)/);
                if (hlMatch) {
                    highlight = hlMatch[1].trim();
                    continue;
                }

                // [소제목] 파싱
                const shMatch = trimmed.match(/^\[소제목\]\s*(.+)/);
                if (shMatch) {
                    flushBody();
                    blocks.push({ type: 'subheading', text: shMatch[1].trim() });
                    continue;
                }

                currentBody.push(line);
            }
            flushBody();

            return { keywords, highlight, blocks };
        };

        // 섹션 콘텐츠 렌더
        const SectionContent = ({ text }) => {
            const { keywords, highlight, blocks } = parseStructured(text);

            return (
                <div className="section-inner">
                    {keywords.length > 0 && (
                        <div className="keyword-bar">
                            {keywords.map((kw, i) => <span key={i} className="keyword-tag">{kw}</span>)}
                        </div>
                    )}
                    {highlight && (
                        <div className="highlight-sentence">{highlight}</div>
                    )}
                    {blocks.map((block, i) => {
                        if (block.type === 'subheading') {
                            return <div key={i} className="sub-heading">{block.text}</div>;
                        }
                        return <div key={i} className="body-text" style={{ whiteSpace: 'pre-wrap' }}>{block.text}</div>;
                    })}
                </div>
            );
        };

        const App = () => {
            const now = new Date();
            const [selectedYear, setSelectedYear] = useState(now.getFullYear());
            const [selectedMonth, setSelectedMonth] = useState(now.getMonth() + 1);
            const [report, setReport] = useState(null);
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [progressLabel, setProgressLabel] = useState('');
            const [toast, setToast] = useState(null);
            const [collapsedSections, setCollapsedSections] = useState({});

            const triggerToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            const monthStr = `${selectedYear}-${String(selectedMonth).padStart(2, '0')}`;

            useEffect(() => { fetchExisting(monthStr); }, []);

            const fetchExisting = async (m) => {
                try {
                    const res = await fetch(`${WORKER_URL}?month=${m}`);
                    const data = await res.json();
                    setReport(data.status === 'OK' ? data : null);
                } catch (e) { setReport(null); }
            };

            const handleMonthChange = (y, m) => {
                setSelectedYear(y); setSelectedMonth(m);
                setReport(null);
                fetchExisting(`${y}-${String(m).padStart(2, '0')}`);
            };

            const generateReport = async () => {
                setLoading(true); setProgress(0);
                setProgressLabel('데이터 수집 중...');
                const steps = [
                    { pct: 15, label: '로그 · 일기장 수집 중...', delay: 1000 },
                    { pct: 30, label: '캘린더 · 통계 계산 중...', delay: 2500 },
                    { pct: 55, label: 'AI 분석 생성 중...', delay: 5000 },
                    { pct: 75, label: '피드백 작성 중...', delay: 12000 },
                    { pct: 90, label: '저장 중...', delay: 20000 },
                ];
                const timers = steps.map(s => setTimeout(() => { setProgress(s.pct); setProgressLabel(s.label); }, s.delay));

                try {
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ month: monthStr })
                    });
                    const data = await res.json();
                    timers.forEach(clearTimeout);

                    if (data.status === 'SUCCESS') {
                        setProgress(100); setProgressLabel('완료!');
                        triggerToast('✨ 월간 리포트 생성 완료!');
                        setTimeout(() => fetchExisting(monthStr), 500);
                    } else if (data.status === 'ALREADY_EXISTS') {
                        triggerToast('이미 존재하는 리포트입니다');
                        fetchExisting(monthStr);
                    } else if (data.status === 'NO_DATA') {
                        triggerToast('해당 월 기록이 없습니다');
                    } else {
                        triggerToast('생성 실패: ' + (data.error || '알 수 없는 오류'));
                    }
                } catch (e) {
                    timers.forEach(clearTimeout);
                    triggerToast('네트워크 오류');
                }
                setTimeout(() => { setLoading(false); setProgress(0); }, 1000);
            };

            const toggleSection = (key) => setCollapsedSections(prev => ({ ...prev, [key]: !prev[key] }));

            const years = [];
            for (let y = 2025; y <= now.getFullYear() + 1; y++) years.push(y);

            const totalH = report ? Math.floor((report.totalMinutes || 0) / 60) : 0;
            const totalM = report ? (report.totalMinutes || 0) % 60 : 0;

            return (
                <div className="widget-container no-scrollbar">
                    <div className="header-section">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Icons.Report className="text-sky-300/70" />
                                <span style={{ fontSize: '15px', fontWeight: 600, letterSpacing: '0.5px', color: 'rgba(186,230,253,0.9)' }}>Monthly Report</span>
                            </div>

                            <div className="flex items-center gap-2">
                                <select className="select-input w-[72px]" value={selectedYear}
                                    onChange={(e) => handleMonthChange(Number(e.target.value), selectedMonth)}>
                                    {years.map(y => <option key={y} value={y}>{y}</option>)}
                                </select>
                                <select className="select-input w-[52px]" value={selectedMonth}
                                    onChange={(e) => handleMonthChange(selectedYear, Number(e.target.value))}>
                                    {Array.from({length:12},(_,i)=>i+1).map(m =>
                                        <option key={m} value={m}>{String(m).padStart(2,'0')}</option>)}
                                </select>
                                <button className="generate-btn flex items-center gap-1.5"
                                    onClick={generateReport} disabled={loading}>
                                    {loading ? <><span className="spinner"/>생성 중...</> : <>리포트 생성</>}
                                </button>
                            </div>
                        </div>

                        {loading && (
                            <div className="mt-2.5 fade-in">
                                <div className="progress-track">
                                    <div className="progress-fill" style={{ width: `${progress}%` }} />
                                </div>
                                <div style={{ fontSize: '10.5px', color: 'rgba(125,211,252,0.6)', marginTop: '4px' }}>{progressLabel}</div>
                            </div>
                        )}

                        {report && !loading && (
                            <div className="flex gap-2 mt-2.5">
                                <span className="stat-pill"><Icons.Flame className="text-sky-300/80"/>{totalH}h {totalM}m</span>
                                <span className="stat-pill"><Icons.Calendar className="text-sky-300/80"/>{report.studyDays||0}일 활동</span>
                                <span className="stat-pill">
                                    일평균 {report.studyDays > 0 ? `${Math.round((report.totalMinutes||0)/report.studyDays)}분` : '-'}
                                </span>
                            </div>
                        )}
                    </div>

                    <div className="content-area no-scrollbar">
                        {!report && !loading && (
                            <div className="flex flex-col items-center justify-center h-full gap-2 text-center" style={{opacity:0.4}}>
                                <div className="text-3xl">📊</div>
                                <div style={{ fontSize: '14px', color: '#94a3b8' }}>{monthStr} 리포트가 없습니다</div>
                                <div style={{ fontSize: '12px', color: '#64748b' }}>버튼을 눌러 생성해보세요</div>
                            </div>
                        )}

                        {loading && !report && (
                            <div className="flex flex-col gap-3 py-4">
                                {[1,2,3].map(i => <div key={i} className="loading-shimmer h-[100px]" style={{animationDelay:`${i*0.15}s`}}/>)}
                            </div>
                        )}

                        {report && (
                            <div className="fade-in">
                                {SECTION_ORDER.map(({key, num, label}) => {
                                    const text = report[key];
                                    if (!text) return null;
                                    const isCollapsed = collapsedSections[key];

                                    return (
                                        <div key={key} className={`section-block ${isCollapsed ? 'collapsed' : ''}`}>
                                            <div className="section-header" onClick={() => toggleSection(key)}>
                                                <span className="section-num">{num}</span>
                                                <span className="section-title">{label}</span>
                                                <div style={{flex:1}}/>
                                                <Icons.ChevronDown className="collapse-icon" />
                                            </div>
                                            <SectionContent text={text} />
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {toast && <div className="toast-message">{toast}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
