<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion 디버그</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
    h2 { font-size: 16px; margin-bottom: 12px; color: #7dd3fc; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input { flex: 1; padding: 10px; border: 1px solid #334155; border-radius: 8px; background: #1e293b; color: white; font-size: 13px; outline: none; }
    input:focus { border-color: #7dd3fc; }
    button { padding: 10px 20px; border: none; border-radius: 8px; background: #0ea5e9; color: white; font-weight: 600; cursor: pointer; font-size: 13px; }
    button:hover { background: #38bdf8; }
    button:disabled { background: #334155; cursor: not-allowed; }
    pre { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; font-size: 11px; line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 70vh; overflow-y: auto; }
    .section { margin-top: 16px; }
    .section h3 { font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .ok { color: #86efac; }
    .warn { color: #fcd34d; }
    .bad { color: #fca5a5; }
  </style>
</head>
<body>
  <h2>Notion 페이지 디버그</h2>
  <p style="font-size:12px;color:#64748b;margin-bottom:12px;">수업 리포트 URL 하나를 넣으면 속성/본문 블록을 날것으로 보여줍니다.</p>

  <div class="row">
    <input id="url" placeholder="노션 수업 리포트 페이지 URL 하나" />
    <button id="btn" onclick="run()">분석</button>
  </div>

  <div id="result"></div>

  <script>
    // ★ 디버그 워커 URL로 교체할 것
    const WORKER = 'https://debug-notion-worker.moonkelly601.workers.dev';

    async function run() {
      const url = document.getElementById('url').value.trim();
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      if (!url) { result.innerHTML = '<p class="bad">URL을 입력해줘</p>'; return; }

      btn.disabled = true; btn.textContent = '분석 중...';
      result.innerHTML = '';

      try {
        const res = await fetch(WORKER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageUrl: url }),
        });
        const data = await res.json();

        let html = '';

        // 1. 속성 상태
        html += '<div class="section"><h3>📋 속성 (Properties)</h3>';
        if (data.properties?.pageError) {
          html += `<p class="bad">페이지 읽기 실패: ${JSON.stringify(data.properties.pageError)}</p>`;
        } else {
          const propCount = data.properties?.count ?? 0;
          const filled = Object.values(data.properties?.details || {}).filter(p => p.hasContent).length;
          html += `<p class="${filled > 0 ? 'ok' : 'warn'}">총 ${propCount}개 속성 중 ${filled}개에 내용 있음</p>`;
          html += '<pre>' + JSON.stringify(data.properties?.details, null, 2) + '</pre>';
        }
        html += '</div>';

        // 2. 블록 상태
        html += '<div class="section"><h3>📄 본문 블록 (Blocks)</h3>';
        if (data.blocks?.blocksError) {
          html += `<p class="bad">블록 읽기 실패: ${JSON.stringify(data.blocks.blocksError)}</p>`;
        } else {
          const bCount = data.blocks?.count ?? 0;
          html += `<p class="${bCount > 0 ? 'ok' : 'bad'}">블록 ${bCount}개 발견${data.blocks?.hasMore ? ' (더 있음)' : ''}</p>`;
          if (bCount > 0) {
            html += '<pre>' + JSON.stringify(data.blocks?.details, null, 2) + '</pre>';
          }
        }
        html += '</div>';

        // 3. 추출된 텍스트
        html += '<div class="section"><h3>📝 추출된 텍스트</h3>';
        const tLen = data.extractedText?.totalLength ?? 0;
        const tLines = data.extractedText?.lineCount ?? 0;
        if (tLen > 0) {
          html += `<p class="ok">${tLines}줄, ${tLen}자 추출 성공</p>`;
          html += '<pre>' + escHtml(data.extractedText?.fullText || '') + '</pre>';
        } else {
          html += '<p class="bad">추출된 텍스트 없음 (0자)</p>';
          html += '<p class="warn">→ AI 노트 내용이 blocks API로 안 읽히는 경우입니다</p>';
        }
        html += '</div>';

        // 4. 판정
        html += '<div class="section"><h3>🔍 판정</h3>';
        const propFilled = Object.values(data.properties?.details || {}).filter(p => p.hasContent).length;
        if (tLen > 100) {
          html += '<p class="ok">✅ 본문 블록에서 텍스트 읽기 성공 → URL 모드 사용 가능</p>';
        } else if (propFilled > 3) {
          html += '<p class="warn">⚠️ 본문은 비었지만 속성에 내용 있음 → 기존 속성 읽기 모드로 폴백 가능</p>';
        } else {
          html += '<p class="bad">❌ 본문도 속성도 비어있음 → 붙여넣기 모드 또는 자동화 필요</p>';
        }
        html += '</div>';

        result.innerHTML = html;

      } catch (e) {
        result.innerHTML = `<p class="bad">Worker 연결 실패: ${e.message}</p>`;
      }

      btn.disabled = false; btn.textContent = '분석';
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
