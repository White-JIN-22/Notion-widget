<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="color-scheme" content="dark light" />
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월 평가서 생성</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    .widget-container {
      width: 300px;
      background: linear-gradient(135deg, rgba(224, 242, 254, 0.25) 0%, rgba(186, 230, 253, 0.15) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(186, 230, 253, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.1);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title svg { width: 15px; height: 15px; stroke: rgba(125, 211, 252, 0.9); }

    label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
    }

    .input-field, .select-field {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus, .select-field:focus {
      border-color: rgba(125, 211, 252, 0.6);
      background: rgba(255, 255, 255, 0.15);
    }

    .input-field::placeholder { color: rgba(255, 255, 255, 0.35); }

    .select-field { -webkit-appearance: none; cursor: pointer; }
    .select-field option { background: #1e293b; color: #e2e8f0; }

    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }

    .url-area {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 11px;
      font-family: 'SF Mono', 'Menlo', monospace;
      line-height: 1.7;
      outline: none;
      transition: all 0.2s;
      resize: vertical;
      min-height: 80px;
      max-height: 160px;
    }

    .url-area:focus {
      border-color: rgba(125, 211, 252, 0.6);
      background: rgba(255, 255, 255, 0.15);
    }

    .url-area::placeholder { color: rgba(255, 255, 255, 0.3); font-family: 'Noto Sans KR', sans-serif; }

    .submit-btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: rgba(125, 211, 252, 0.4);
      color: white;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .submit-btn:hover:not(.loading) { background: rgba(125, 211, 252, 0.6); }
    .submit-btn.loading { background: rgba(125, 211, 252, 0.2); color: rgba(255,255,255,0.5); cursor: not-allowed; pointer-events: none; }

    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status { font-size: 11px; min-height: 16px; display: flex; align-items: center; gap: 5px; word-break: break-all; }
    .status.success { color: #86efac; }
    .status.error { color: #fca5a5; }
    .status svg { width: 13px; height: 13px; flex-shrink: 0; }

    .input-group { display: flex; flex-direction: column; gap: 4px; }

    .help-text { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: -2px; }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
      </svg>
      월 평가서 생성
    </div>

    <div class="row">
      <div class="input-group">
        <label>학생명</label>
        <input type="text" id="studentName" class="input-field" placeholder="풀네임 입력" maxlength="3" />
      </div>
      <div class="input-group">
        <label>과목</label>
        <select id="subject" class="select-field">
          <option value="국어">국어</option>
          <option value="일본어">일본어</option>
          <option value="영어">영어</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label>평가 월</label>
      <input type="month" id="evalMonth" class="input-field" />
    </div>

    <div class="input-group">
      <label>수업 리포트 URL (줄바꿈 구분)</label>
      <textarea id="pageUrls" class="url-area" placeholder="1주차 페이지 URL&#10;2주차 페이지 URL&#10;3주차 페이지 URL&#10;4주차 페이지 URL"></textarea>
      <div class="help-text">노션 수업리포트 페이지 URL을 한 줄에 하나씩</div>
    </div>

    <button class="submit-btn" id="generateBtn" onclick="generate()">평가서 생성</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const WORKER_URL = 'https://monthly-eval-worker.moonkelly601.workers.dev';

    const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
    const ICON_X = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';

    // 기본값: 현재 월
    const now = new Date();
    document.getElementById('evalMonth').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

    async function generate() {
      const studentName = document.getElementById('studentName').value.trim();
      const subject = document.getElementById('subject').value;
      const month = document.getElementById('evalMonth').value;
      const urlsRaw = document.getElementById('pageUrls').value.trim();
      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');

      if (!studentName) { status.innerHTML = ICON_X + ' 학생명을 입력해줘'; status.className = 'status error'; return; }
      if (!month) { status.innerHTML = ICON_X + ' 평가 월을 선택해줘'; status.className = 'status error'; return; }
      if (!urlsRaw) { status.innerHTML = ICON_X + ' 리포트 URL을 붙여넣어줘'; status.className = 'status error'; return; }

      const pageUrls = urlsRaw.split('\n').map(u => u.trim()).filter(Boolean);
      if (pageUrls.length === 0) { status.innerHTML = ICON_X + ' 유효한 URL이 없어'; status.className = 'status error'; return; }

      btn.innerHTML = '<div class="spinner"></div> 생성 중...';
      btn.className = 'submit-btn loading';
      status.innerHTML = '';
      status.className = 'status';

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentName, subject, month, pageUrls }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          status.innerHTML = ICON_CHECK + ' 평가서 생성 완료';
          status.className = 'status success';
        } else {
          const errMsg = data.error || '요청 실패';
          status.innerHTML = ICON_X + ' ' + errMsg;
          status.className = 'status error';
        }
      } catch (err) {
        status.innerHTML = ICON_X + ' Worker 연결 실패';
        status.className = 'status error';
      }

      btn.innerHTML = '평가서 생성';
      btn.className = 'submit-btn';
    }
  </script>
</body>
</html>
