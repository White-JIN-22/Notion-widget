<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="color-scheme" content="dark light" />
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월 평가서 생성</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:transparent;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:12px}
    .w{width:280px;background:linear-gradient(135deg,rgba(224,242,254,.25),rgba(186,230,253,.15));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,255,255,.3);box-shadow:0 8px 32px rgba(186,230,253,.2),inset 0 0 20px rgba(255,255,255,.1);padding:14px;display:flex;flex-direction:column;gap:8px}
    .title{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px}
    .title svg{width:14px;height:14px;stroke:rgba(125,211,252,.9)}
    label{font-size:10px;font-weight:500;color:rgba(255,255,255,.5)}
    .f,.sel{width:100%;padding:7px 10px;border:1px solid rgba(255,255,255,.25);border-radius:8px;background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:.2s}
    .f:focus,.sel:focus{border-color:rgba(125,211,252,.6);background:rgba(255,255,255,.15)}
    .f::placeholder{color:rgba(255,255,255,.3)}
    .sel{-webkit-appearance:none;cursor:pointer}
    .sel option{background:#1e293b;color:#e2e8f0}
    .row{display:flex;gap:6px}
    .row>*{flex:1}
    .g{display:flex;flex-direction:column;gap:3px}

    /* Toggle */
    .trow{display:flex;align-items:center;gap:6px;padding:2px 0}
    .tlbl{font-size:10px;color:rgba(255,255,255,.5)}
    .tval{font-size:10px;font-weight:600;color:rgba(125,211,252,.8);width:24px}
    .sw{position:relative;width:32px;height:18px;background:rgba(255,255,255,.15);border-radius:9px;cursor:pointer;transition:.2s;flex-shrink:0}
    .sw.on{background:rgba(125,211,252,.4)}
    .sw::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.2s}
    .sw.on::after{transform:translateX(14px)}

    /* Entries */
    .entries{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
    .ent{display:flex;flex-direction:column;gap:3px;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12)}
    .ent-h{display:flex;justify-content:space-between;align-items:center}
    .ent-l{font-size:10px;font-weight:600;color:rgba(125,211,252,.7)}
    .ent-x{font-size:9px;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .ent-x:hover{color:#fca5a5}
    .ta{width:100%;padding:6px 8px;border:1px solid rgba(255,255,255,.18);border-radius:6px;background:rgba(255,255,255,.06);color:#fff;font-size:11px;font-family:'Noto Sans KR',sans-serif;line-height:1.5;outline:none;resize:vertical;min-height:48px;max-height:160px}
    .ta:focus{border-color:rgba(125,211,252,.5)}
    .ta::placeholder{color:rgba(255,255,255,.2);font-size:10px}
    .add{width:100%;padding:5px;border:1px dashed rgba(255,255,255,.18);border-radius:6px;background:transparent;color:rgba(255,255,255,.35);font-size:10px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:.2s}
    .add:hover{border-color:rgba(125,211,252,.5);color:rgba(125,211,252,.7)}

    /* Button */
    .btn{width:100%;padding:9px;border:none;border-radius:8px;background:rgba(125,211,252,.4);color:#fff;font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px}
    .btn:hover:not(.ld){background:rgba(125,211,252,.6)}
    .btn.ld{background:rgba(125,211,252,.15);color:rgba(255,255,255,.4);cursor:not-allowed;pointer-events:none}
    .sp{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:s .6s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
    .st{font-size:10px;min-height:14px;display:flex;align-items:center;gap:4px;word-break:break-all}
    .st.ok{color:#86efac}.st.er{color:#fca5a5}
    .st svg{width:12px;height:12px;flex-shrink:0}
    .help{font-size:9px;color:rgba(255,255,255,.28);text-align:center}
  </style>
</head>
<body>
<div class="w">
  <div class="title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    월 평가서 생성
  </div>

  <div class="row">
    <div class="g"><label>학생명</label><input type="text" id="name" class="f" placeholder="풀네임" maxlength="5"/></div>
    <div class="g"><label>과목</label>
      <select id="subj" class="sel"><option value="국어">국어</option><option value="일본어">일본어</option><option value="영어">영어</option></select>
    </div>
  </div>

  <div class="row">
    <div class="g"><label>평가 월</label><input type="month" id="month" class="f"/></div>
    <div class="g" style="justify-content:flex-end">
      <div class="trow">
        <span class="tlbl">성인</span>
        <div class="sw" id="sw" onclick="tog()"></div>
        <span class="tval" id="sv">OFF</span>
      </div>
    </div>
  </div>

  <div class="entries" id="entries"></div>
  <button class="add" onclick="addE()">+ 회기 추가</button>

  <button class="btn" id="btn" onclick="go()">평가서 생성</button>
  <div class="st" id="st"></div>
  <div class="help">노션 AI 노트 본문을 회기별로 복사-붙여넣기</div>
</div>

<script>
const W='https://monthly-eval-worker.moonkelly601.workers.dev';
const IC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
const IX='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';

let adult=false,ec=0;
const n=new Date();
document.getElementById('month').value=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
for(let i=0;i<4;i++)addE();

function tog(){adult=!adult;document.getElementById('sw').classList.toggle('on',adult);document.getElementById('sv').textContent=adult?'ON':'OFF'}

function addE(){
  ec++;const c=document.getElementById('entries');
  const d=document.createElement('div');d.className='ent';d.id=`e${ec}`;
  d.innerHTML=`<div class="ent-h"><span class="ent-l">${ec}회기</span><button class="ent-x" onclick="rmE('e${ec}')">삭제</button></div><textarea class="ta" placeholder="수업 리포트 내용 붙여넣기"></textarea>`;
  c.appendChild(d);
}

function rmE(id){const e=document.getElementById(id);if(e)e.remove();document.querySelectorAll('.ent').forEach((e,i)=>e.querySelector('.ent-l').textContent=`${i+1}회기`)}

async function go(){
  const name=document.getElementById('name').value.trim();
  const subj=document.getElementById('subj').value;
  const month=document.getElementById('month').value;
  const btn=document.getElementById('btn');
  const st=document.getElementById('st');

  if(!name){err('학생명 입력');return}
  if(!month){err('평가 월 선택');return}

  const reports=[];
  document.querySelectorAll('.ent').forEach((e,i)=>{
    const t=e.querySelector('.ta').value.trim();
    if(t)reports.push({label:`${i+1}회기`,content:t});
  });
  if(!reports.length){err('최소 1개 회기 내용 필요');return}

  btn.innerHTML='<div class="sp"></div> 생성 중...';btn.className='btn ld';
  st.innerHTML='';st.className='st';

  try{
    const r=await fetch(W,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({studentName:name,subject:subj,month,reports,isAdult:adult})});
    const d=await r.json();
    if(r.ok&&d.success){
      st.innerHTML=IC+` 완료 (${d.reportCount}회기`+(adult?'':' · 문자 포함')+')';
      st.className='st ok';
    }else{err(d.error||'실패')}
  }catch(e){err('Worker 연결 실패')}

  btn.innerHTML='평가서 생성';btn.className='btn';
}

function err(m){const s=document.getElementById('st');s.innerHTML=IX+' '+m;s.className='st er'}
</script>
</body>
</html>
