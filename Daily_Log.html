<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="color-scheme" content="dark light">
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon"> 
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Log</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&family=Roboto+Mono:wght@400;500;700&display=swap');

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .font-serif { font-family: 'Playfair Display', serif; } 
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .widget-container {
            position: relative;
            width: 310px;
            height: 520px;
            background: linear-gradient(180deg, rgba(224, 242, 254, 0.25) 0%, rgba(240, 249, 255, 0.15) 100%);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(224, 242, 254, 0.4);
            box-shadow: 0 8px 32px rgba(186, 230, 253, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #334155;
        }

        .header-section {
            background: rgba(255, 255, 255, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 16px 10px 16px;
            backdrop-filter: blur(5px);
            flex-shrink: 0;
        }

        .glass-panel {
            background: rgba(224, 242, 254, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            transition: all 0.2s;
        }

        .tab-btn {
            transition: all 0.2s;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.7rem;
            color: #94a3b8;
            letter-spacing: -0.02em;
            padding: 5px 0;
        }

        .log-item {
            animation: slideUp 0.3s ease-out forwards;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(224, 242, 254, 0.2);
            border-radius: 14px;
            padding: 8px 12px;
            min-height: 46px;
            display: flex;
            align-items: center;
            position: relative; 
            margin-bottom: 4px;
        }

        .log-item-compact {
            animation: slideUp 0.3s ease-out forwards;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(224, 242, 254, 0.15);
            border-radius: 10px;
            padding: 4px 12px; 
            display: flex;
            align-items: center;
            justify-content: center; 
            min-height: 28px;
            margin-bottom: 4px;
            position: relative;
        }

        .universal-delete-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; padding: 4px; transition: color 0.2s; cursor: pointer; z-index: 10;
        }
        .universal-delete-btn:hover { color: #ffffff; }

        @keyframes slideUp { from { transform: translateY(5px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .modal-content {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(240, 249, 255, 0.98) 100%);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 -20px 50px rgba(186, 230, 253, 0.2);
            color: #334155;
        }

        .quest-btn {
            background: rgba(224, 242, 254, 0.1);
            border: 1px solid rgba(224, 242, 254, 0.2);
            color: #e0f2fe;
            transition: all 0.2s;
        }
        .quest-btn:hover { background: rgba(224, 242, 254, 0.2); border-color: #bae6fd; color: white; }

        .modal-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #475569;
            transition: all 0.2s;
        }
        .modal-btn:hover { background: rgba(255, 255, 255, 1); border-color: #7dd3fc; color: #0ea5e9; }

        .manual-tab {
            padding: 4px 0; font-size: 0.75rem; font-weight: 700;
            color: #94a3b8; border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .manual-tab.active { color: #7dd3fc; border-bottom-color: #7dd3fc; }

        .custom-select {
            width: 100%; border-radius: 10px; padding: 5px;
            font-weight: 700; outline: none; text-align: center; text-align-last: center; appearance: none;
            cursor: pointer; background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.6); color: #334155; font-size: 0.9rem;
            -webkit-appearance: none; -moz-appearance: none;
        }
        .custom-select option { text-align: center; }
        
        .toast-message {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
            border: 1px solid rgba(186, 230, 253, 0.5); color: #0ea5e9;
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-weight: 700;
            pointer-events: none; z-index: 100;
            animation: fadeUp 0.3s ease-out forwards; white-space: nowrap;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }

        .text-sky-300 { color: #7dd3fc; text-shadow: 0 0 10px rgba(14, 165, 233, 0.3); } 
        .text-dim { color: #94a3b8; }
        .text-bright { color: #ffffff; text-shadow: 0 0 10px rgba(186, 230, 253, 0.3); }

        .thin-scrollbar::-webkit-scrollbar { width: 4px; }
        .thin-scrollbar::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
        .thin-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(203, 213, 225, 0.5); border-radius: 10px; }
        .thin-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(148, 163, 184, 0.8); }

        .balance-gauge {
            position: relative; width: 100%; height: 6px; border-radius: 3px;
            background: linear-gradient(to right, #d8b4fe 0%, #7dd3fc 50%, #fef08a 100%);
            margin-top: 8px;
        }
        .balance-needle {
            position: absolute; top: -3px; width: 4px; height: 12px;
            background: white; border-radius: 2px;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
            transition: left 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="root" style="width: 100%; height: 100%; display: flex; justify-content: center;"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('focus');
            const [lifeEnergy, setLifeEnergy] = useState(50);
            const [energy, setEnergy] = useState(100);
            const [blocks, setBlocks] = useState([]);
            
            const [isRecording, setIsRecording] = useState(false);
            const [startTime, setStartTime] = useState(null);
            const [elapsed, setElapsed] = useState(0);
            const [showIntro, setShowIntro] = useState(false);

            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('manual');
            const [focusType, setFocusType] = useState('공부');
            const [manualTab, setManualTab] = useState('focus'); 
            const [timeRef, setTimeRef] = useState('end'); 
            
            const [deleteTargetId, setDeleteTargetId] = useState(null);
            const [toast, setToast] = useState(null);
            const [tempSession, setTempSession] = useState(null);
            const [visibleLogs, setVisibleLogs] = useState(3);

            const [manualEndHour, setManualEndHour] = useState(12);
            const [manualEndMin, setManualEndMin] = useState(0);
            const [manualDurHour, setManualDurHour] = useState(0);
            const [manualDurMin, setManualDurMin] = useState(30);
            const [optDurHour, setOptDurHour] = useState(0);
            const [optDurMin, setOptDurMin] = useState(0);
            const [pendingQuest, setPendingQuest] = useState(null);
            const [focusMemo, setFocusMemo] = useState('');
            
            const [todoList, setTodoList] = useState([]); 
            const [selectedTodoId, setSelectedTodoId] = useState(null); 
            const [showTodoSelect, setShowTodoSelect] = useState(false); 

            const [isSending, setIsSending] = useState(false);
            const lastAutoSyncRef = useRef(Date.now());

            const [wakeUpTime, setWakeUpTime] = useState(null);
            const [wakeUpHour, setWakeUpHour] = useState(7);
            const [wakeUpMin, setWakeUpMin] = useState(0);
            const [bedTime, setBedTime] = useState(null);
            const [bedHour, setBedHour] = useState(23);
            const [bedMin, setBedMin] = useState(0);

            // 낮잠 상태 (종료=현재시각, 시작=2시간 전)
            const _napNow = new Date();
            const _napStart = new Date(_napNow.getTime() - 2 * 60 * 60 * 1000);
            const [napStartHour, setNapStartHour] = useState(_napStart.getHours());
            const [napStartMin, setNapStartMin] = useState(Math.floor(_napStart.getMinutes() / 10) * 10);
            const [napEndHour, setNapEndHour] = useState(_napNow.getHours());
            const [napEndMin, setNapEndMin] = useState(Math.floor(_napNow.getMinutes() / 10) * 10);

            const formatLocalYMD = (d) => {
                if (typeof d === 'string') d = new Date(d);

                const effectiveRef = customTime ? 'end' : timeRef;

                // 자정 걸침 처리

                const targetIdStr = String(deleteTargetId);

            const openManual = () => {

                setOptDurHour(0); setOptDurMin(0); setShowModal(true);

            // ═══ Sync ═══
            const syncFromServer = async () => {
                if (!WORKER_URL) return;
                try {
                    const now = new Date(); const dateYMD = formatLocalYMD(now); const dateStr = now.toDateString();
                    const res = await fetch(`${WORKER_URL}?date=${dateYMD}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.blocks && Array.isArray(data.blocks)) {
                            const savedData = JSON.parse(localStorage.getItem('fortressData') || '{}');
                            let localBlocks = (savedData.date === dateStr) ? (savedData.blocks || []) : [];
                            let mergedBlocks;
                            if (localBlocks.length > 0 || blocks.length > 0) {
                                const bm = new Map(); localBlocks.forEach(b => bm.set(b.id, b)); blocks.forEach(b => bm.set(b.id, b));
                                mergedBlocks = Array.from(bm.values());
                            } else { mergedBlocks = data.blocks.filter(b => new Date(b.startTime).toDateString() === dateStr); }
                            mergedBlocks.sort((a, b) => b.startTime - a.startTime);

                            const initLife = savedData.date === dateStr && savedData.initialLifeEnergy !== undefined ? savedData.initialLifeEnergy : 50;
                            let initFocus = 100; let enableReplay = true;
                            if (savedData.date === dateStr) {
                                if (savedData.initialFocusEnergy !== undefined) initFocus = savedData.initialFocusEnergy;
                                else if (savedData.energy !== undefined) { initFocus = savedData.energy; enableReplay = false; }
                            }
                            let calcLife = initLife; let calcEnergy = initFocus;
                            if (enableReplay) {
                                [...mergedBlocks].sort((a,b) => a.startTime - b.startTime).forEach(b => {
                                    let rv = b.recovery || 0;
                                    if (!rv) { const mq = switchButtons.find(q => q.name === b.name); if (mq) rv = mq.recovery || 0; }
                                    if (b.type === 'switch') { calcEnergy = Math.max(0, calcEnergy - 5); calcLife = Math.min(100, calcLife + (rv || 10)); }
                                    else if (b.type === 'rest') { calcEnergy = Math.min(100, calcEnergy + rv); }
                                    else { calcEnergy = Math.max(0, calcEnergy - Math.floor((b.duration || 0) / 20) * 10); }
                                });
                            } else { calcLife = savedData.lifeEnergy || lifeEnergy; calcEnergy = savedData.energy || energy; }

                            setBlocks(mergedBlocks); setLifeEnergy(calcLife); setEnergy(calcEnergy);
                            const isLocalToday = savedData.date === dateStr;
                            const dWake = (isLocalToday && savedData.wakeUpTime) ? savedData.wakeUpTime : (data.wakeUpTime || null);
                            const dBed = (isLocalToday && savedData.bedTime) ? savedData.bedTime : (data.bedTime || null);
                            if (dWake && dWake !== "-") setWakeUpTime(dWake);
                            if (dBed && dBed !== "-") setBedTime(dBed);
                            if ((dWake && dWake !== "-") || (isLocalToday && savedData.introDone)) setShowIntro(false);

                            localStorage.setItem('fortressData', JSON.stringify({
                                date: dateStr, initialLifeEnergy: initLife, initialFocusEnergy: initFocus,
                                lifeEnergy: calcLife, energy: calcEnergy, blocks: mergedBlocks,
                                wakeUpTime: dWake || wakeUpTime, bedTime: dBed || bedTime, introDone: true
                            }));
                            triggerToast("✅ 동기화 완료");
                        }
                    }
                } catch (e) { console.error("Sync Error:", e); }
            };

            const manualSync = async () => {
                if (isSending) return; setIsSending(true); triggerToast("☁️ 동기화 중...");
                try { await syncFromServer(); } catch (e) { triggerToast("⚠️ 동기화 실패"); }
                finally { setIsSending(false); }
            };

            const sendToNotion = async (silent = false) => {
                if (!WORKER_URL) return; setIsSending(true);
                try {
                    const savedData = JSON.parse(localStorage.getItem('fortressData') || '{}');
                    const rawBlocks = savedData.blocks || [];
                    const formattedDate = formatLocalYMD(new Date(savedData.date));
                    const processedBlocks = []; let splitIdx = 0;
                    rawBlocks.forEach(b => {
                        if (!b.startTime || !b.endTime) return;
                        let start = b.startTime; const end = b.endTime;
                        const d = new Date(start);
                        const noon = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0).getTime();
                        const evening = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 18, 0, 0).getTime();
                        if (start < noon && end > noon) { processedBlocks.push({ ...b, id: `${b.id}_s${splitIdx++}`, startTime: start, endTime: noon, duration: (noon-start)/60000 }); start = noon; }
                        if (start < evening && end > evening) { processedBlocks.push({ ...b, id: `${b.id}_s${splitIdx++}`, startTime: start, endTime: evening, duration: (evening-start)/60000 }); start = evening; }
                        const rem = (end - start) / 60000;
                        if (rem > 0) processedBlocks.push({ ...b, id: start === b.startTime && end === b.endTime ? b.id : `${b.id}_s${splitIdx++}`, startTime: start, endTime: end, duration: rem });
                    });

                    let stats = { morn: {dur:0,ss:0}, aft: {dur:0,ss:0}, night: {dur:0,ss:0} };
                    const getScore = q => q === 'Sun' ? 3 : q === 'Rain' ? 1 : 2;
                    processedBlocks.forEach(b => {
                        if (b.type === 'focus' || !b.type) {
                            const dur = Math.round(b.duration || 0); const sc = getScore(b.quality);
                            for (let i = 0; i < dur; i++) {
                                const h = new Date(b.startTime + i*60000).getHours();
                                if (h < 12) { stats.morn.dur++; stats.morn.ss += sc; }
                                else if (h < 18) { stats.aft.dur++; stats.aft.ss += sc; }
                                else { stats.night.dur++; stats.night.ss += sc; }
                            }
                        }
                    });
                    const totalD = stats.morn.dur + stats.aft.dur + stats.night.dur;
                    const totalS = stats.morn.ss + stats.aft.ss + stats.night.ss;
                    const avgW = (d, s) => { if (!d) return null; const a = s/d; return a >= 2.5 ? "Sun" : a >= 1.5 ? "Cloud" : "Rain"; };

                    const syncRes = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            date: formattedDate, blocks: processedBlocks, lifeEnergy, energy,
                            wakeUpTime: wakeUpTime || "-", bedTime: bedTime || "-", title: "Daily Log",
                            total: totalD, morn_total: stats.morn.dur, aft_total: stats.aft.dur, night_total: stats.night.dur,
                            quality: avgW(totalD,totalS), q_morn: avgW(stats.morn.dur,stats.morn.ss), q_aft: avgW(stats.aft.dur,stats.aft.ss), q_night: avgW(stats.night.dur,stats.night.ss),
                            deletedIds: getDeletedIds()
                        })
                    });
                    if (!syncRes.ok) { const errData = await syncRes.json().catch(() => ({})); throw new Error(errData.error || `HTTP ${syncRes.status}`); }
                    if (!silent) triggerToast("✅ 동기화 완료!");
                    localStorage.setItem('lastSyncTime', Date.now().toString());
                } catch (e) { if (!silent) triggerToast("⚠️ 동기화 실패"); }
                finally { setIsSending(false); }
            };

            // ═══ 균형 게이지 계산 ═══
            const getBalanceRatio = () => {
                const focusMin = blocks.filter(b => b.type === 'focus' || !b.type).reduce((a, b) => a + (b.duration || 0), 0);
                const switchMin = blocks.filter(b => b.type === 'switch').reduce((a, b) => a + (b.duration || 0), 0);
                const total = focusMin + switchMin;
                if (total === 0) return 50;
                return Math.round((focusMin / total) * 100);
            };

            // ═══ Helpers ═══
            const renderIcon = (name, className) => { const IC = Icons[name] || Icons.Zap; return <IC className={className} />; };
            const renderBlockIcon = (block) => {
                if (block.type === 'focus' || !block.type) {
                    if (block.quality === 'Sun') return <Icons.Sun className="w-8 h-8 text-purple-300" />;
                    if (block.quality === 'Cloud') return <Icons.Flame className="w-8 h-8 text-sky-300" />;
                    return <Icons.Rain className="w-8 h-8 text-slate-400" />;
                }
                const IC = Icons[block.icon] || Icons.Zap;
                const c = block.color || (block.type === 'switch' ? 'text-purple-300' : 'text-yellow-200');
                return <IC className={`w-3 h-3 ${c}`} />;
            };
            const formatDuration = (min) => { const h = Math.floor(min/60); const m = min%60; return h > 0 ? `${h}h ${m}m` : `${m}m`; };
            const formatTimeStr = (ts) => { if (!ts) return ''; const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
            const loadMoreLogs = () => setVisibleLogs(prev => prev + 3);

            // ═══ 오늘 총 집중시간 ═══
            const totalFocusMin = blocks.filter(b => b.type === 'focus' || !b.type).reduce((a, b) => a + (b.duration || 0), 0);

            // ═══ Timer Panel ═══
            const renderTimerPanel = () => {
                const radius = 28; const circ = 2 * Math.PI * radius;
                let progress, strokeColor;
                if (elapsed < 180) { progress = Math.max(0, (180 - elapsed) / 180); strokeColor = "#7dd3fc"; }
                else { progress = 1; strokeColor = "#ffffff"; }
                const dashoffset = circ - (progress * circ);

                return (
                    <div className="glass-panel py-2 px-3 mb-2 relative overflow-hidden border-sky-300/30">
                        <div className="flex justify-between items-center mb-1 px-1">
                            <span className="text-[9px] font-bold uppercase tracking-wider text-sky-300">
                                {isRecording ? (elapsed < 180 ? "IGNITION..." : "FLOW STATE") : "READY"}
                            </span>
                            <div className="flex items-center gap-1">
                                <span className="text-[10px] font-bold text-sky-300 tabular-nums">{formatDuration(totalFocusMin)}</span>
                                <button onClick={openManual} className="text-dim hover:text-sky-300 transition-colors ml-1"><Icons.Plus /></button>
                            </div>
                        </div>
                        <div className="flex items-center justify-between px-1 pb-1">
                            <div className="relative w-14 h-14 flex items-center justify-center">
                                <svg className="absolute top-0 left-0 w-full h-full transform -rotate-90" width="56" height="56" viewBox="0 0 72 72">
                                    <circle stroke="rgba(255,255,255,0.1)" strokeWidth="5" fill="transparent" r={radius} cx="36" cy="36" />
                                    <circle className="progress-ring__circle" stroke={strokeColor} strokeWidth="5" fill="transparent" r={radius} cx="36" cy="36"
                                        style={{ strokeDasharray: `${circ} ${circ}`, strokeDashoffset: dashoffset, strokeLinecap: "round" }} />
                                </svg>
                                <button onClick={toggleTimer} className={`absolute inset-0 m-auto w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-all active:scale-95 text-white z-10 ${isRecording ? 'bg-[#7dd3fc] hover:bg-[#bae6fd]' : 'bg-[#bae6fd] hover:bg-[#7dd3fc]'}`}>
                                    {isRecording ? <Icons.Stop className="w-4 h-4" /> : <Icons.Play className="w-5 h-5 ml-0.5" />}
                                </button>
                            </div>
                            <div className="flex-1 flex justify-end">{formatStopwatch(elapsed)}</div>
                        </div>

                    </div>
                );
            };

            // ═══ Intro ═══
            if (showIntro) {
                return (
                    <div className="widget-container justify-center p-6 text-center space-y-6">
                        <div>
                            <h1 className="text-xl font-bold text-bright mb-2 font-serif tracking-wide">Daily Log</h1>
                            <p className="text-dim text-xs">오늘도 화이팅!</p>
                        </div>
                        <div className="flex flex-col gap-2 w-full">
                            <button onClick={() => handleIntro()} className="glass-panel p-4 hover:bg-white/10 transition-all flex flex-col items-center">
                                <Icons.Sun /><span className="block mt-2 text-sm font-bold text-bright">하루 시작하기</span>
                            </button>
                            <button onClick={() => { setShowIntro(false); const s = JSON.parse(localStorage.getItem('fortressData') || '{}'); s.introDone = false; localStorage.setItem('fortressData', JSON.stringify(s)); triggerToast("🌙 집중 모드"); }}
                                className="w-full py-3 mt-1 rounded-xl border border-white/10 text-slate-400 hover:text-white hover:bg-white/5 transition-all flex items-center justify-center gap-2">
                                <Icons.Moon className="w-4 h-4" /><span className="text-xs font-bold">아직 집중 중</span>
                            </button>
                        </div>
                    </div>
                );
            }

            const balanceRatio = getBalanceRatio();

            // ═══ Main Render ═══
            return (
                <div className="widget-container">
                    {toast && <div className="toast-message">{toast}</div>}

                    {/* ═══ HEADER ═══ */}
                    <div className="header-section">
                        <div className="flex justify-between items-center">
                            {/* 왼쪽: 기상시간 + 취침시간 */}
                            <div className="flex items-center gap-3">
                                <button onClick={openWakeUpModal} className="flex items-center gap-1 hover:opacity-80 transition-opacity">
                                    <Icons.Sun className="w-4 h-4 text-white" />
                                    <span className="text-sm font-bold text-white tabular-nums tracking-tight">{wakeUpTime || "--:--"}</span>
                                </button>
                                <button onClick={openBedTimeModal} className="flex items-center gap-1 hover:opacity-80 transition-opacity">
                                    <Icons.Moon className="w-3.5 h-3.5 text-white/70" />
                                    <span className="text-sm font-bold text-white/70 tabular-nums tracking-tight">{bedTime || "--:--"}</span>
                                </button>
                            </div>
                            {/* 오른쪽: 동기화 */}
                            <button onClick={manualSync} disabled={isSending} className="w-7 h-7 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/20 transition-all">
                                <Icons.Refresh className={`w-3.5 h-3.5 ${isSending ? 'animate-spin text-white' : ''}`} />
                            </button>
                        </div>

                        {/* 균형 게이지 */}
                        <div className="balance-gauge">
                            <div className="balance-needle" style={{ left: `calc(${balanceRatio}% - 2px)` }}></div>
                        </div>
                        <div className="flex justify-between mt-1">
                            <span className="text-[8px] font-bold" style={{color:'#d8b4fe'}}>전환</span>
                            <span className="text-[8px] font-bold" style={{color:'#7dd3fc'}}>균형</span>
                            <span className="text-[8px] font-bold" style={{color:'#fef08a'}}>집중</span>
                        </div>
                    </div>

                    {/* ═══ TABS ═══ */}
                    <div className="px-3 flex gap-1.5 mb-1 mt-2">
                        {[
                            { id: 'switch', label: '✧ Switch ✧', activeStyle: 'bg-white/20 text-purple-300 border border-purple-300/30' },
                            { id: 'focus', label: '✧ Focus ✧', activeStyle: 'bg-white/20 text-sky-300 border border-sky-300/30' },
                            { id: 'rest', label: '✧ Rest ✧', activeStyle: 'bg-white/20 border border-yellow-200/30', activeColor: '#fef08a' }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                className={`flex-1 tab-btn ${activeTab === tab.id ? tab.activeStyle : 'text-slate-400 hover:bg-white/10 hover:text-white'}`}
                                style={activeTab === tab.id && tab.activeColor ? {color: tab.activeColor} : {}}>
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    {/* ═══ CONTENT ═══ */}
                    <div className="flex-1 px-3 pb-3 overflow-hidden flex flex-col">

                        {/* 집중 탭 */}
                        {activeTab === 'focus' && (
                            <div className="flex flex-col h-full">
                                {renderTimerPanel()}
                                <div className="flex-1 overflow-y-auto no-scrollbar space-y-1.5 relative">
                                    {(() => {
                                        const sorted = [...blocks].sort((a,b) => b.startTime - a.startTime);
                                        const visible = sorted.slice(0, visibleLogs).reverse();
                                        return (<>
                                            {sorted.length > visibleLogs && (
                                                <button onClick={loadMoreLogs} className="w-full py-1 flex items-center justify-center text-dim hover:text-bright transition-colors mb-1">
                                                    <Icons.ChevronUp />
                                                </button>
                                            )}
                                            {visible.length === 0 ? (
                                                <div className="text-center text-dim py-6 text-xs italic">기록이 없습니다.</div>
                                            ) : visible.map(block => {
                                                const isCompact = block.type === 'switch' || block.type === 'rest';
                                                const isFocus = !isCompact;
                                                return (
                                                    <div key={block.id} className={isCompact ? "log-item-compact" : "log-item"}>
                                                        <div className={`${isCompact ? "" : "mr-3"} flex items-center justify-center`}>{renderBlockIcon(block)}</div>
                                                        {isCompact ? (
                                                            <div className="mx-3 text-[10px] text-slate-300 font-bold">{block.name}</div>
                                                        ) : (
                                                            <div className="flex-1 pr-14">
                                                                <div className="text-sm font-bold text-bright mb-0.5">{formatDuration(block.duration)}</div>
                                                                {block.memo && <div className="text-[10px] text-dim font-medium break-words whitespace-pre-wrap leading-tight mb-0.5">{block.memo}</div>}
                                                                <div className="text-[10px] text-dim font-medium">{formatTimeStr(block.startTime)} ~ {formatTimeStr(block.endTime)}</div>
                                                            </div>
                                                        )}
                                                        {isFocus && <button onClick={() => extendDuration(block.id)} className="absolute right-8 top-1/2 transform -translate-y-1/2 text-[#94a3b8] hover:text-white p-1 transition-colors"><Icons.Plus /></button>}
                                                        <button onClick={() => confirmDelete(block.id)} className="universal-delete-btn"><Icons.Trash /></button>
                                                    </div>
                                                );
                                            })}
                                        </>);
                                    })()}
                                </div>
                            </div>
                        )}

                        {/* 전환 탭 */}
                        {activeTab === 'switch' && (
                            <div className="grid grid-cols-4 gap-1 mt-1 h-full overflow-hidden content-start">
                                {switchButtons.map(q => (
                                    <button key={q.id} onClick={() => handleActivity(q, 'switch')}
                                        className={`quest-btn p-1 rounded-2xl flex flex-col items-center justify-center h-[56px] transition-all group border ${
                                            MODAL_TARGETS.includes(q.id) ? 'bg-white/15 border-white/15 hover:bg-white/25' : 'bg-white/5 border-white/5 hover:bg-white/10'
                                        }`}>
                                        {renderIcon(q.icon, `w-5 h-5 text-purple-300 mb-0.5`)}
                                        <span className="text-[11px] font-bold text-bright truncate w-full text-center px-0.5">{q.name}</span>
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* 휴식 탭 */}
                        {activeTab === 'rest' && (
                            <div className="flex flex-col items-center pt-4 gap-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <Icons.NapIcon className="w-5 h-5" style={{color:'#eab308'}} />
                                    <span className="text-sm font-bold" style={{color:'#eab308'}}>낮잠</span>
                                </div>

                                {/* 시작 시간 */}
                                <div className="flex items-center gap-2 w-full px-2">
                                    <label className="text-xs font-bold w-10" style={{color:'#eab308'}}>시작</label>
                                    <select value={napStartHour} onChange={e=>setNapStartHour(Number(e.target.value))} className="custom-select text-sm flex-1" style={{background:'rgba(254,240,138,0.1)', borderColor:'rgba(254,240,138,0.3)', color:'#fef9c3'}}>
                                        {Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}시</option>)}
                                    </select>
                                    <select value={napStartMin} onChange={e=>setNapStartMin(Number(e.target.value))} className="custom-select text-sm flex-1" style={{background:'rgba(254,240,138,0.1)', borderColor:'rgba(254,240,138,0.3)', color:'#fef9c3'}}>
                                        {Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}
                                    </select>
                                </div>

                                {/* 종료 시간 */}
                                <div className="flex items-center gap-2 w-full px-2">
                                    <label className="text-xs font-bold w-10" style={{color:'#eab308'}}>종료</label>
                                    <select value={napEndHour} onChange={e=>setNapEndHour(Number(e.target.value))} className="custom-select text-sm flex-1" style={{background:'rgba(254,240,138,0.1)', borderColor:'rgba(254,240,138,0.3)', color:'#fef9c3'}}>
                                        {Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}시</option>)}
                                    </select>
                                    <select value={napEndMin} onChange={e=>setNapEndMin(Number(e.target.value))} className="custom-select text-sm flex-1" style={{background:'rgba(254,240,138,0.1)', borderColor:'rgba(254,240,138,0.3)', color:'#fef9c3'}}>
                                        {Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}
                                    </select>
                                </div>

                                <button onClick={recordNap} className="w-full mx-2 py-2.5 rounded-xl font-bold text-sm transition-all hover:opacity-90"
                                    style={{background:'rgba(254,240,138,0.2)', border:'1px solid rgba(254,240,138,0.3)', color:'#fef08a'}}>
                                    낮잠 기록
                                </button>

                                {/* 오늘 낮잠 기록 */}
                                <div className="w-full mt-2">
                                    {blocks.filter(b => b.name === '낮잠').map(b => (
                                        <div key={b.id} className="flex items-center justify-between px-3 py-1.5 rounded-lg mb-1 relative" style={{background:'rgba(254,240,138,0.08)', border:'1px dashed rgba(254,240,138,0.2)'}}>
                                            <div className="flex items-center gap-2">
                                                <Icons.NapIcon className="w-3 h-3" style={{color:'#eab308'}} />
                                                <span className="text-[11px] font-bold" style={{color:'#fef9c3'}}>{formatTimeStr(b.startTime)} ~ {formatTimeStr(b.endTime)}</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-[10px] font-bold" style={{color:'#eab308'}}>{formatDuration(b.duration)}</span>
                                                <button onClick={() => confirmDelete(b.id)} className="text-white/30 hover:text-white/70 transition-colors p-0.5"><Icons.Trash /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ═══ MODALS ═══ */}
                    {showModal && (
                        <div className="absolute inset-0 modal-overlay z-50 flex items-end justify-center" onClick={() => setShowModal(false)}>
                            <div className={`w-full modal-content rounded-t-2xl p-4 animate-slide-up shadow-2xl flex flex-col ${modalType === 'manual' ? 'h-[340px]' : 'h-auto pb-6'}`} onClick={e => e.stopPropagation()}>

                                {/* 삭제 확인 */}
                                {modalType === 'delete' && (
                                    <div className="text-center mt-2">
                                        <h3 className="text-base font-bold mb-2 text-slate-700">기록 삭제</h3>
                                        <div className="flex gap-2 mt-4">
                                            <button onClick={() => setShowModal(false)} className="flex-1 py-2 rounded-xl bg-white/50 hover:bg-white/80 text-slate-500 font-bold text-sm">취소</button>
                                            <button onClick={executeDelete} className="flex-1 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold border border-slate-200 text-sm">삭제</button>
                                        </div>
                                    </div>
                                )}

                                {/* 기상 시간 */}
                                {modalType === 'wakeup' && (
                                    <div className="text-center">
                                        <h3 className="text-base font-bold mb-3 text-slate-700 font-serif">｡✧ Wake Up ✧｡</h3>
                                        <div className="flex justify-center gap-2 mb-5">
                                            <select value={wakeUpHour} onChange={e=>setWakeUpHour(Number(e.target.value))} className="custom-select text-lg w-20">
                                                {Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}</option>)}
                                            </select>
                                            <span className="self-center font-bold text-slate-400">:</span>
                                            <select value={wakeUpMin} onChange={e=>setWakeUpMin(Number(e.target.value))} className="custom-select text-lg w-20">
                                                {Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setShowModal(false)} className="flex-1 py-2 rounded-xl bg-white/50 text-slate-500 font-bold text-sm">취소</button>
                                            <button onClick={handleWakeUpSave} className="flex-1 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold border border-slate-200 text-sm">확인</button>
                                        </div>
                                    </div>
                                )}

                                {/* 취침 시간 */}
                                {modalType === 'bedtime' && (
                                    <div className="text-center">
                                        <h3 className="text-base font-bold mb-3 text-slate-700 font-serif">｡✧ Bed Time ✧｡</h3>
                                        <div className="flex justify-center gap-2 mb-5">
                                            <select value={bedHour} onChange={e=>setBedHour(Number(e.target.value))} className="custom-select text-lg w-20">
                                                {Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}</option>)}
                                            </select>
                                            <span className="self-center font-bold text-slate-400">:</span>
                                            <select value={bedMin} onChange={e=>setBedMin(Number(e.target.value))} className="custom-select text-lg w-20">
                                                {Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setShowModal(false)} className="flex-1 py-2 rounded-xl bg-white/50 text-slate-500 font-bold text-sm">취소</button>
                                            <button onClick={handleBedTimeSave} className="flex-1 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold border border-slate-200 text-sm">확인</button>
                                        </div>
                                    </div>
                                )}

                                {/* 활동 로그 모달 (specific-log) */}
                                {modalType === 'specific-log' && pendingQuest && (
                                    <>
                                        <div className="flex items-center justify-center gap-2 mb-2">
                                            {renderIcon(pendingQuest.icon, `w-6 h-6 ${pendingQuest.color}`)}
                                            <h3 className="text-base font-bold text-slate-700">｡✧ {pendingQuest.name} ✧｡</h3>
                                        </div>
                                        <div className="space-y-4 mb-6">
                                            <div className="flex items-center justify-between px-2">
                                                <button onClick={() => setTimeRef(p => p === 'end' ? 'start' : 'end')}
                                                    className="w-12 text-xs font-bold text-slate-500 hover:text-blue-400 underline underline-offset-4 text-left">
                                                    {timeRef === 'start' ? '시작' : '종료'}
                                                </button>
                                                <div className="flex gap-2">
                                                    <select value={manualEndHour} onChange={e=>setManualEndHour(Number(e.target.value))} className="custom-select text-sm w-16">
                                                        {Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}시</option>)}
                                                    </select>
                                                    <select value={manualEndMin} onChange={e=>setManualEndMin(Number(e.target.value))} className="custom-select text-sm w-16">
                                                        {Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between px-2">
                                                <label className="text-slate-500 text-xs font-bold w-12 text-left">소요</label>
                                                <div className="flex gap-2">
                                                    <select value={manualDurHour} onChange={e=>setManualDurHour(Number(e.target.value))} className="custom-select text-sm w-16">
                                                        {[0,1,2,3,4,5].map(h => <option key={h} value={h}>{h}시간</option>)}
                                                    </select>
                                                    <select value={manualDurMin} onChange={e=>setManualDurMin(Number(e.target.value))} className="custom-select text-sm w-16">
                                                        {Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => { setShowModal(false); setPendingQuest(null); }} className="flex-1 py-3 rounded-xl bg-white/50 text-slate-500 font-bold text-sm">취소</button>
                                            <button onClick={() => {
                                                const t = pendingQuest.type === 'focus-sub' ? 'manual-focus-sub' : `manual-${pendingQuest.type}`;
                                                addRecord(pendingQuest.type === 'focus-sub' ? 'Cloud' : null, t, pendingQuest);
                                            }} className="flex-1 py-3 rounded-xl bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold border border-slate-300 text-sm">기록</button>
                                        </div>
                                    </>
                                )}

                                {/* 수동 입력 모달 */}
                                {modalType === 'manual' && (
                                    <>
                                    <div className="flex gap-4 justify-center mb-1 mt-1">
                                        <button onClick={() => { setManualTab('switch'); setTimeRef('start'); setOptDurHour(0); setOptDurMin(0); }} className={`manual-tab ${manualTab === 'switch' ? '!text-purple-300 !border-purple-300' : ''}`}>✧ Switch ✧</button>
                                        <button onClick={() => { setManualTab('focus'); setTimeRef('end'); }} className={`manual-tab ${manualTab === 'focus' ? 'active' : ''}`}>✧ Focus ✧</button>
                                        <button onClick={() => { setManualTab('rest'); setTimeRef('start'); setOptDurHour(0); setOptDurMin(0); }} className={`manual-tab ${manualTab === 'rest' ? '!border-b-2' : ''}`} style={manualTab === 'rest' ? {color:'#ca8a04', borderColor:'#ca8a04'} : {}}>✧ Rest ✧</button>
                                    </div>

                                    {/* Focus 탭 시간 설정 */}
                                    {manualTab === 'focus' && (
                                        <div className="space-y-0.5 mb-1 px-0.5 pb-1 border-b border-dashed border-slate-200">
                                            <div className="flex items-center justify-between">
                                                <button onClick={() => setTimeRef(p => p === 'end' ? 'start' : 'end')} className="w-12 ml-1 text-xs font-bold text-slate-500 hover:text-blue-400 underline underline-offset-4 text-left">{timeRef === 'start' ? '시작' : '종료'}</button>
                                                <div className="flex-1 flex gap-2">
                                                    <select value={manualEndHour} onChange={e=>setManualEndHour(Number(e.target.value))} className="custom-select text-sm">{Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}시</option>)}</select>
                                                    <select value={manualEndMin} onChange={e=>setManualEndMin(Number(e.target.value))} className="custom-select text-sm">{Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}</select>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between mt-1">
                                                <label className="text-slate-500 text-xs font-bold w-12 ml-1 text-left">집중</label>
                                                <div className="flex-1 flex gap-2">
                                                    <select value={manualDurHour} onChange={e=>setManualDurHour(Number(e.target.value))} className="custom-select text-sm !bg-slate-100 !border-slate-200">{[0,1,2,3,4,5].map(h => <option key={h} value={h}>{h}시간</option>)}</select>
                                                    <select value={manualDurMin} onChange={e=>setManualDurMin(Number(e.target.value))} className="custom-select text-sm !bg-slate-100 !border-slate-200">{Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}</select>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Switch/Rest 시간 설정 */}
                                    {(manualTab === 'switch' || manualTab === 'rest') && (
                                        <div className="space-y-0.5 mb-1 px-0.5 pb-1 border-b border-dashed border-slate-200">
                                            <div className="flex items-center justify-between">
                                                <button onClick={() => setTimeRef(p => p === 'end' ? 'start' : 'end')} className="w-12 ml-1 text-xs font-bold text-slate-500 hover:text-blue-400 underline underline-offset-4 text-left">{timeRef === 'start' ? '시작' : '종료'}</button>
                                                <div className="flex-1 flex gap-2">
                                                    <select value={manualEndHour} onChange={e=>setManualEndHour(Number(e.target.value))} className="custom-select text-sm">{Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}시</option>)}</select>
                                                    <select value={manualEndMin} onChange={e=>setManualEndMin(Number(e.target.value))} className="custom-select text-sm">{Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}</select>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between mt-1">
                                                <label className="text-slate-400 text-xs font-bold w-12 ml-1 text-left">소요</label>
                                                <div className="flex-1 flex gap-2">
                                                    <select value={optDurHour} onChange={e=>setOptDurHour(Number(e.target.value))} className="custom-select text-sm !text-slate-500 !bg-slate-100 !border-slate-200">{[0,1,2,3,4,5].map(h => <option key={h} value={h}>{h}시간</option>)}</select>
                                                    <select value={optDurMin} onChange={e=>setOptDurMin(Number(e.target.value))} className="custom-select text-sm !text-slate-500 !bg-slate-100 !border-slate-200">{Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}</select>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex-1 overflow-y-auto no-scrollbar pt-0">
                                        {/* Focus: 입력 + Todo + 저장 */}
                                        {manualTab === 'focus' && (
                                            <div className="flex flex-col h-full px-0.5 pb-2">
                                                <div className="mb-2">
                                                    <div className="flex items-center bg-white/50 border border-white/60 rounded-xl px-3 py-2 focus-within:border-sky-300">
                                                        <input type="text" placeholder="어떤 일에 집중했나요?" value={focusMemo} onChange={e => { setFocusMemo(e.target.value); setSelectedTodoId(null); }}
                                                            className="flex-1 bg-transparent text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none font-bold tracking-tight" />
                                                    </div>
                                                </div>
                                                <div className="mb-2 relative z-20">
                                                    <button onClick={() => { const s = JSON.parse(localStorage.getItem('jinsolTodos') || '[]'); setTodoList(s.filter(t=>!t.done)); setShowTodoSelect(!showTodoSelect); }}
                                                        className={`w-full py-2 px-3 rounded-xl border flex items-center justify-between transition-all ${selectedTodoId ? 'bg-sky-50 border-sky-200 text-sky-600' : 'bg-white/40 border-white/40 text-slate-500'}`}>
                                                        <div className="flex items-center gap-2 overflow-hidden">
                                                            <Icons.CheckCircle className={`w-4 h-4 ${selectedTodoId ? 'text-sky-500' : 'text-slate-300'}`} />
                                                            <span className="text-xs font-bold truncate">{selectedTodoId ? "할 일 선택됨" : "할 일 목록에서 가져오기"}</span>
                                                        </div>
                                                        <Icons.ChevronUp className={`w-4 h-4 transition-transform ${showTodoSelect ? '' : 'rotate-180'} opacity-50`} />
                                                    </button>
                                                    {showTodoSelect && (
                                                        <div className="absolute top-full left-0 right-0 mt-1 bg-white/95 backdrop-blur-md border border-slate-200 rounded-xl shadow-xl z-50 max-h-[120px] overflow-y-auto p-1 thin-scrollbar">
                                                            {todoList.length === 0 ? <div className="p-3 text-center text-xs text-slate-400">남은 할 일 없음</div>
                                                            : todoList.map(t => (
                                                                <button key={t.id} onClick={() => { setFocusMemo(t.text); setSelectedTodoId(t.id); setShowTodoSelect(false); }}
                                                                    className="w-full text-left px-3 py-2 text-xs font-bold text-slate-600 hover:bg-sky-50 rounded-lg">{t.text}</button>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex gap-1.5 mb-3">
                                                    {['공부','독서','강연'].map(ft => (
                                                        <button key={ft} onClick={() => setFocusType(ft)}
                                                            className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all border ${focusType === ft ? 'bg-sky-50 border-sky-300 text-sky-600' : 'bg-white/30 border-white/40 text-slate-400 hover:bg-white/50'}`}>
                                                            {ft === '공부' ? '📖' : ft === '독서' ? '📚' : '🎓'} {ft}
                                                        </button>
                                                    ))}
                                                </div>
                                                <button onClick={() => addRecord('Cloud', 'manual')} className="mt-auto w-full py-3 rounded-xl bg-sky-50 hover:bg-sky-100 text-sky-600 font-bold text-sm border border-sky-200 transition-all">
                                                    기록
                                                </button>
                                            </div>
                                        )}

                                        {/* Switch 버튼 그리드 */}
                                        {manualTab === 'switch' && (
                                            <div className="grid grid-cols-4 gap-1">
                                                {switchButtons.map(q => (
                                                    <button key={q.id} onClick={() => addRecord(null, 'manual-switch', q)} className="modal-btn px-1 py-1 rounded-xl flex flex-col items-center justify-center h-[54px]">
                                                        {renderIcon(q.icon, `w-5 h-5 text-purple-400 mb-1`)}
                                                        <span className="text-[10px] font-bold break-keep text-center leading-tight tracking-tight">{q.name}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        {/* Rest: 낮잠 기록 */}
                                        {manualTab === 'rest' && (
                                            <div className="flex flex-col gap-3 px-0.5 pb-2">
                                                <div className="flex items-center justify-center gap-2">
                                                    <Icons.NapIcon className="w-5 h-5" style={{color:'#ca8a04'}} />
                                                    <span className="text-sm font-bold" style={{color:'#ca8a04'}}>낮잠</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <label className="text-xs font-bold w-8" style={{color:'#ca8a04'}}>시작</label>
                                                    <select value={napStartHour} onChange={e=>setNapStartHour(Number(e.target.value))} className="custom-select text-sm flex-1">{Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}시</option>)}</select>
                                                    <select value={napStartMin} onChange={e=>setNapStartMin(Number(e.target.value))} className="custom-select text-sm flex-1">{Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}</select>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <label className="text-xs font-bold w-8" style={{color:'#ca8a04'}}>종료</label>
                                                    <select value={napEndHour} onChange={e=>setNapEndHour(Number(e.target.value))} className="custom-select text-sm flex-1">{Array.from({length:24},(_,i)=>i).map(h => <option key={h} value={h}>{h}시</option>)}</select>
                                                    <select value={napEndMin} onChange={e=>setNapEndMin(Number(e.target.value))} className="custom-select text-sm flex-1">{Array.from({length:12},(_,i)=>i*5).map(m => <option key={m} value={m}>{String(m).padStart(2,'0')}분</option>)}</select>
                                                </div>
                                                <button onClick={() => { recordNap(); setShowModal(false); }} className="w-full py-2.5 rounded-xl font-bold text-sm transition-all" style={{background:'rgba(234,179,8,0.12)', border:'1px solid rgba(234,179,8,0.3)', color:'#ca8a04'}}>
                                                    낮잠 기록
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                    </>
                                )}

                                {/* 체크 모달 (타이머 종료 후) */}
                                {modalType === 'check' && (
                                    <div className="flex flex-col h-full px-0.5 pb-2">
                                        <h3 className="text-base font-bold mb-3 text-center text-slate-700 font-serif">｡✧ Ignition Complete ✧｡</h3>
                                        <div className="mb-2">
                                            <div className="flex items-center bg-white/50 border border-white/60 rounded-xl px-3 py-2.5 focus-within:border-sky-300">
                                                <input type="text" placeholder="어떤 일에 집중했나요?" value={focusMemo} onChange={e => { setFocusMemo(e.target.value); setSelectedTodoId(null); }}
                                                    className="flex-1 bg-transparent text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none font-bold tracking-tight" />
                                            </div>
                                        </div>
                                        <div className="mb-2 relative z-20">
                                            <button onClick={() => { const s = JSON.parse(localStorage.getItem('jinsolTodos') || '[]'); setTodoList(s.filter(t=>!t.done)); setShowTodoSelect(!showTodoSelect); }}
                                                className={`w-full py-2.5 px-3 rounded-xl border flex items-center justify-between transition-all ${selectedTodoId ? 'bg-sky-50 border-sky-200 text-sky-600' : 'bg-white/40 border-white/40 text-slate-500'}`}>
                                                <div className="flex items-center gap-2"><Icons.CheckCircle className={`w-4 h-4 ${selectedTodoId ? 'text-sky-500' : 'text-slate-300'}`} /><span className="text-xs font-bold">{selectedTodoId ? "할 일 선택됨" : "할 일 목록에서 가져오기"}</span></div>
                                                <Icons.ChevronUp className={`w-4 h-4 transition-transform ${showTodoSelect ? '' : 'rotate-180'} opacity-50`} />
                                            </button>
                                            {showTodoSelect && (
                                                <div className="absolute top-full left-0 right-0 mt-1 bg-white/95 backdrop-blur-md border border-slate-200 rounded-xl shadow-xl z-50 max-h-[120px] overflow-y-auto p-1 thin-scrollbar">
                                                    {todoList.length === 0 ? <div className="p-3 text-center text-xs text-slate-400">남은 할 일 없음</div>
                                                    : todoList.map(t => (
                                                        <button key={t.id} onClick={() => { setFocusMemo(t.text); setSelectedTodoId(t.id); setShowTodoSelect(false); }}
                                                            className="w-full text-left px-3 py-2 text-xs font-bold text-slate-600 hover:bg-sky-50 rounded-lg">{t.text}</button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex gap-1.5 mb-3">
                                            {['공부','독서','강연'].map(ft => (
                                                <button key={ft} onClick={() => setFocusType(ft)}
                                                    className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all border ${focusType === ft ? 'bg-sky-50 border-sky-300 text-sky-600' : 'bg-white/30 border-white/40 text-slate-400 hover:bg-white/50'}`}>
                                                    {ft === '공부' ? '📖' : ft === '독서' ? '📚' : '🎓'} {ft}
                                                </button>
                                            ))}
                                        </div>
                                        <button onClick={() => addRecord('Cloud', 'auto')} className="mt-auto w-full py-3 rounded-xl bg-sky-50 hover:bg-sky-100 text-sky-600 font-bold text-sm border border-sky-200 transition-all">
                                            기록 저장
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
