<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="color-scheme" content="dark light" />
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리포트 생성</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    .widget-container {
      width: 260px;
      background: linear-gradient(135deg, rgba(224, 242, 254, 0.25) 0%, rgba(186, 230, 253, 0.15) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(186, 230, 253, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.1);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title svg {
      width: 15px;
      height: 15px;
      stroke: rgba(125, 211, 252, 0.9);
    }

    .input-field {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 12px;
      font-family: 'SF Mono', 'Menlo', 'Noto Sans KR', monospace;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: rgba(125, 211, 252, 0.6);
      background: rgba(255, 255, 255, 0.15);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.4);
      font-family: 'Noto Sans KR', sans-serif;
    }

    .hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.4;
      margin-top: -4px;
    }

    .submit-btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: rgba(125, 211, 252, 0.4);
      color: white;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .submit-btn:hover:not(.loading) {
      background: rgba(125, 211, 252, 0.6);
    }

    .submit-btn.loading {
      background: rgba(125, 211, 252, 0.2);
      color: rgba(255, 255, 255, 0.5);
      cursor: not-allowed;
      pointer-events: none;
    }

    .submit-btn .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 11px;
      min-height: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status.success { color: #86efac; }
    .status.error { color: #fca5a5; }

    .status svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
      </svg>
      리포트 생성
    </div>

    <input
      type="text"
      id="pageIdInput"
      class="input-field"
      placeholder="페이지 ID 또는 URL 붙여넣기"
      spellcheck="false"
      autocomplete="off"
    />
    <div class="hint">notion.so/ 뒤 ID 또는 페이지 URL 전체</div>

    <button class="submit-btn" id="generateBtn" onclick="generate()">생성</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const WORKER_URL = 'https://coaching-report-worker.moonkelly601.workers.dev';

    function extractPageId(input) {
      const cleaned = input.trim();
      // URL에서 추출
      const urlMatch = cleaned.match(/notion\.so\/(?:[^/]*-)?([a-f0-9\-]{32,36})/i);
      if (urlMatch) return urlMatch[1].replace(/-/g, '');
      // ?v= 앞의 ID 추출
      const paramMatch = cleaned.match(/([a-f0-9\-]{32,36})\?/i);
      if (paramMatch) return paramMatch[1].replace(/-/g, '');
      // 순수 ID만 입력
      const idOnly = cleaned.replace(/-/g, '').match(/^[a-f0-9]{32}$/i);
      if (idOnly) return idOnly[0];
      return null;
    }

    async function generate() {
      const input = document.getElementById('pageIdInput');
      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');

      const pageId = extractPageId(input.value);
      if (!pageId) {
        status.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 유효한 페이지 ID를 입력해줘';
        status.className = 'status error';
        return;
      }

      btn.innerHTML = '<div class="spinner"></div> 생성 중...';
      btn.className = 'submit-btn loading';
      status.innerHTML = '';
      status.className = 'status';

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageId }),
        });

        const data = await res.json();

        if (res.ok) {
          status.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 리포트 생성 시작됨';
          status.className = 'status success';
        } else {
          status.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ' + (data.error || '요청 실패');
          status.className = 'status error';
        }
      } catch (err) {
        status.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Worker 연결 실패';
        status.className = 'status error';
      }

      btn.innerHTML = '생성';
      btn.className = 'submit-btn';
    }

    document.getElementById('pageIdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate();
    });
  </script>
</body>
</html>
