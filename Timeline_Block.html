<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="color-scheme" content="dark light">
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Block</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* [추가] 분 단위(세로) 컨테이너 */
.minute-scale-col {
    display: flex;
    flex-direction: column;
    padding: 22px 0 12px 0; 
    width: 14px;
    margin-right: 2px;
    flex-shrink: 0;
    margin-left: 1px;
    gap: 1px; /* [핵심 수정] 시간표 블록 사이 간격과 통일 */
}

/* [추가] 개별 분 라벨 (블록과 높이 1:1 매칭) */
.minute-label-item {
    flex: 1; /* 중요: time-block과 똑같이 높이 균등 분할 */
    display: flex;
    align-items: center; /* 수직 중앙 정렬 */
    justify-content: flex-end; /* 우측 정렬 */
    font-size: 8px;
    color: rgba(255, 255, 255, 0.4);
    font-family: 'Roboto Mono', monospace;
    line-height: 1;
}
        
        /* [가로형 위젯 컨테이너] */
        .widget-container {
            position: relative;
            width: 440px;
            height: 120px;
            background: linear-gradient(90deg, rgba(224, 242, 254, 0.25) 0%, rgba(240, 249, 255, 0.15) 100%);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            border: 1px solid rgba(224, 242, 254, 0.4);
            box-shadow: 0 8px 32px rgba(186, 230, 253, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            color: #334155;
        }

        .font-mono-nums { font-family: 'Roboto Mono', monospace; letter-spacing: -0.5px; }
        
        /* [좌측 패널] - 더 밝게 */
        .left-panel {
            width: 115px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px 10px 20px 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* [우측 타임라인 영역] */
        .timeline-area {
            flex: 1;
            /* 상단 여백(pt)을 22px로 늘려 시간 라벨이 잘리지 않게 확보 */
            padding: 22px 16px 12px 2px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .grid-container {
    display: flex;
    flex-direction: row;
    height: 100%;
    justify-content: space-between;
    align-items: flex-start; /* [수정] flex-end -> flex-start */
    gap: 0px;
}

        /* [수정] flex -> grid로 변경하여 절대위치 요소(라벨)가 gap에 영향 주는 것 방지 */
.hour-column {
    flex: 1;
    display: grid; /* flex 대신 grid 사용 */
    grid-template-rows: repeat(6, 1fr); /* 6개의 균등한 행(10분 단위) 강제 분할 */
    height: 100%;
    min-width: 0;
    gap: 1px;
    position: relative;
    
    /* 오른쪽 점선 구분선 */
    border-right: 1px dashed rgba(255, 255, 255, 0.15); 
    padding-right: 1px; 
    padding-left: 1px; 
}

/* [추가] 마지막 시간대(23시) 오른쪽에는 선 없애기 */
.hour-column:last-child {
    border-right: none;
    padding-right: 0;
}

        .time-label {
            position: absolute;
            /* 그리드 상단 기준 위로 올림. 부모 패딩 덕분에 잘리지 않음 */
            top: -14px; 
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Roboto Mono', monospace;
            line-height: 1;
        }

        .time-block {
    flex: 1;
    min-height: 0; /* [핵심 수정] 내부 아이콘 크기 무시하고 강제 분할 */
    border-radius: 2px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative; 
    overflow: hidden; 
}
        
        /* 블록 스타일 */
        .block-sun { background: rgba(216, 180, 254, 0.7); border: 1px solid rgba(216, 180, 254, 0.9); }
        .block-cloud { background: rgba(125, 211, 252, 0.6); border: 1px solid rgba(125, 211, 252, 0.8); }
        .block-rain { background: rgba(148, 163, 184, 0.5); border: 1px solid rgba(148, 163, 184, 0.6); }
        .block-empty { background: rgba(255, 255, 255, 0.04); }
        .block-action-bg { 
    background: transparent; 
    border: 1px solid transparent; /* [핵심 수정] none -> transparent */
}

        /* [수정] 네온 효과 제거 (색깔만 남김) */
        .text-sky-custom { color: #7dd3fc; } 
        .text-purple-custom { color: #d8b4fe; }
        .text-white { color: #ffffff; }

        /* 현재 시간 인디케이터 */
        .now-indicator {
            position: absolute;
            top: 0;
            left: -1px;
            right: -1px;
            height: 1.5px;
            background: white;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
            z-index: 30;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ═══ 현재 시간 추적 (10분 단위) ═══
        const useNowSlot = () => {
            const [now, setNow] = useState(new Date());
            useEffect(() => {
                const iv = setInterval(() => setNow(new Date()), 30000);
                return () => clearInterval(iv);
            }, []);
            return { nowHour: now.getHours(), nowSlot: Math.floor(now.getMinutes() / 10), nowMinInSlot: now.getMinutes() % 10 };
        };

        const CALENDAR_API = "https://log-cal.moonkelly601.workers.dev/";
        const FEEDBACK_WORKER_URL = "https://feedback-worker.moonkelly601.workers.dev";
        const categoryColors = {
            '업무': 'bg-[#7dd3fc]',      
            '자기계발': 'bg-[#d8b4fe]', 
            '휴식': 'bg-[#94a3b8]',

            Home: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            Pen: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l5.5 5.5"></path><path d="M11 11l5.5 5.5"></path></svg>,
            Flame: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.1.2-2.2.6-3.3a7 7 0 0 0 3 3.3z"></path></svg>,
            Cup: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>,
            Pill: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="7" width="18" height="10" rx="5" ry="5"></rect><line x1="12" y1="7" x2="12" y2="17"></line></svg>,
            Pot: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12h20"></path><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"></path><path d="M4 12V7a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v5"></path><path d="M12 3v-1"></path></svg>,
            Message: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Sparkle: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"></path></svg>,
            Stretch: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="15"></line></svg>,
        };

        // ═══ ICS 파싱 (RECURRENCE-ID 지원) ═══
        const TB_CALENDARS = {
            red: "https://p151-caldav.icloud.com/published/2/MjAxNzA0NzQzNTEyMDE3MBESdZX6cJss130QKAIlxInlf0nwQRwqVQaKN3oFgWzqLUfigKhteMNDAjQwkPlHzBe_ELV5RYcePFbCOI5H3TM",
            orange: "https://p151-caldav.icloud.com/published/2/MjAxNzA0NzQzNTEyMDE3MBESdZX6cJss130QKAIlxIlkFT1ZEqbRVczq6PrGuVHb0Afa1EhpfGiSULTpK_tYur-eQz2Uqc74JIqfAKkjBP8",
            blue: "https://p151-caldav.icloud.com/published/2/MjAxNzA0NzQzNTEyMDE3MBESdZX6cJss130QKAIlxImfGB8G7hln8RI2A4WFBMN51g9wFHOsIhQgRFNSx9Dz4_f4s6w0S4RBWQw9Fgtt2mU",
            green: "https://p151-caldav.icloud.com/published/2/MjAxNzA0NzQzNTEyMDE3MBESdZX6cJss130QKAIlxIks_Phe4DHFMcJQdGTXVekoe7DfsUtHGLCLydgauhnycV_BUoW1c_GcPu0dMkd_m9I"
        };
        const TB_CAT_MAP = { red:'업무', orange:'건강', blue:'자기계발', green:'휴식' };
        const BYDAY_MAP = { SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6 };

        const safeParseDate = (dateStr) => {
            if (!dateStr || typeof dateStr !== 'string') return null;
            try {
                const isUTC = dateStr.endsWith('Z');
                const cs = dateStr.replace('Z','');
                const y=parseInt(cs.substring(0,4)),mo=parseInt(cs.substring(4,6))-1,d=parseInt(cs.substring(6,8));
                let h=0,mi=0;
                if (cs.includes('T')) { h=parseInt(cs.substring(9,11)); mi=parseInt(cs.substring(11,13)); }
                if (isUTC) { const dt=new Date(Date.UTC(y,mo,d,h,mi)); return isNaN(dt)?null:dt; }
                return new Date(y,mo,d,h,mi);
            } catch(e) { return null; }
        };

        const expandRRule = (rruleStr, dtStart, dtEnd, exDates=[]) => {
            if (!rruleStr||!dtStart) return [];
            const params={};
            rruleStr.replace('RRULE:','').split(';').forEach(p=>{const[k,v]=p.split('=');params[k]=v;});
            const freq=params.FREQ,until=params.UNTIL?safeParseDate(params.UNTIL):null,count=params.COUNT?parseInt(params.COUNT):null;
            const interval=params.INTERVAL?parseInt(params.INTERVAL):1;
            const byDay=params.BYDAY?params.BYDAY.split(','):null,byMonthDay=params.BYMONTHDAY?params.BYMONTHDAY.split(',').map(Number):null;
            const now=new Date(),rangeStart=new Date(now.getFullYear(),now.getMonth()-6,1),rangeEnd=new Date(now.getFullYear(),now.getMonth()+7,0);
            const hardLimit=until&&until<rangeEnd?until:rangeEnd,maxInst=count||500;
            const duration=dtEnd?(dtEnd.getTime()-dtStart.getTime()):3600000;
            const instances=[];
            const exSet=new Set(exDates.map(d=>{const p=safeParseDate(d);return p?`${p.getFullYear()}-${p.getMonth()}-${p.getDate()}`:''}));
            const isEx=(d)=>exSet.has(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
            if(freq==='DAILY'){let cur=new Date(dtStart);while(cur<=hardLimit&&instances.length<maxInst){if(cur>=rangeStart&&!isEx(cur))instances.push({start:new Date(cur),end:new Date(cur.getTime()+duration)});cur.setDate(cur.getDate()+interval);}}
            else if(freq==='WEEKLY'){if(byDay){const tds=byDay.map(d=>BYDAY_MAP[d]).filter(d=>d!==undefined);let ws=new Date(dtStart);ws.setDate(ws.getDate()-ws.getDay());while(ws<=hardLimit&&instances.length<maxInst){for(const dow of tds){const c=new Date(ws);c.setDate(c.getDate()+dow);c.setHours(dtStart.getHours(),dtStart.getMinutes(),0,0);if(c>=dtStart&&c<=hardLimit&&c>=rangeStart&&!isEx(c))instances.push({start:new Date(c),end:new Date(c.getTime()+duration)});}ws.setDate(ws.getDate()+7*interval);}}else{let cur=new Date(dtStart);while(cur<=hardLimit&&instances.length<maxInst){if(cur>=rangeStart&&!isEx(cur))instances.push({start:new Date(cur),end:new Date(cur.getTime()+duration)});cur.setDate(cur.getDate()+7*interval);}}}
            else if(freq==='MONTHLY'){let cur=new Date(dtStart);while(cur<=hardLimit&&instances.length<maxInst){if(byMonthDay){for(const md of byMonthDay){const c=new Date(cur.getFullYear(),cur.getMonth(),md,dtStart.getHours(),dtStart.getMinutes());if(c>=dtStart&&c<=hardLimit&&c>=rangeStart&&!isEx(c))instances.push({start:new Date(c),end:new Date(c.getTime()+duration)});}}else{if(cur>=rangeStart&&!isEx(cur))instances.push({start:new Date(cur),end:new Date(cur.getTime()+duration)});}cur.setMonth(cur.getMonth()+interval);}}
            else if(freq==='YEARLY'){let cur=new Date(dtStart);while(cur<=hardLimit&&instances.length<maxInst){if(cur>=rangeStart&&!isEx(cur))instances.push({start:new Date(cur),end:new Date(cur.getTime()+duration)});cur.setFullYear(cur.getFullYear()+interval);}}
            return instances;
        };

        const App = () => {
            const [blocks, setBlocks] = useState([]);
            const [events, setEvents] = useState([]);
            const [totalDuration, setTotalDuration] = useState(0);
            const [wakeUpTime, setWakeUpTime] = useState(null);
            const [bedTime, setBedTime] = useState(null);
            const [viewDate, setViewDate] = useState(new Date());
            const [dailyFeedback, setDailyFeedback] = useState('');
            const [feedbackLoading, setFeedbackLoading] = useState(false);

            const { nowHour, nowSlot, nowMinInSlot } = useNowSlot();
            const viewIsToday = viewDate.toDateString() === new Date().toDateString();

            // [수정] 최신 blocks 상태를 추적하기 위한 Ref (깜빡임 방지용)
            const blocksRef = useRef(blocks);
            useEffect(() => { blocksRef.current = blocks; }, [blocks]);

            const isToday = (d) => d.toDateString() === new Date().toDateString();

            const getTodayStr = () => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            };
            
            const loadLocalData = () => {
                if (!isToday(viewDate)) return;
                const savedData = JSON.parse(localStorage.getItem('fortressData') || '{}');
                const today = new Date().toDateString();
                
                if (savedData.date === today && savedData.blocks) {
                    // 깜빡임 방지: 블록 개수나 내용이 실제로 변경됐을 때만 업데이트
                    const currentBlocksJson = JSON.stringify(blocksRef.current);
                    const newBlocksJson = JSON.stringify(savedData.blocks);
                    
                    if (currentBlocksJson !== newBlocksJson) {
                        setBlocks(savedData.blocks);
                    }
                    setWakeUpTime(savedData.wakeUpTime || null);
                    setBedTime(savedData.bedTime || null);
                } else if (blocksRef.current.length > 0) {
                    // 데이터가 없을 때만 비우기 (불필요한 빈 배열 set 방지)
                    setBlocks([]);
                    setWakeUpTime(null);
                }
            };

            const fetchCalendar = async () => {
                const targetStr = viewDate.toDateString();
                const y=viewDate.getFullYear(), m=String(viewDate.getMonth()+1).padStart(2,'0'), d=String(viewDate.getDate()).padStart(2,'0');
                const targetKey = `${y}${m}${d}`;
                const results = [];

                for (const [colorKey, url] of Object.entries(TB_CALENDARS)) {
                    try {
                        const res = await fetch(`${CALENDAR_API}?url=${encodeURIComponent(url)}&t=${Date.now()}`);
                        if (!res.ok) continue;
                        const text = await res.text();

                        const rawLines = text.split(/\r?\n/);
                        const lines = [];
                        for (const line of rawLines) {
                            if ((line.startsWith(' ')||line.startsWith('\t'))&&lines.length>0) lines[lines.length-1]+=line.substring(1);
                            else lines.push(line);
                        }

                        let event={}, exDates=[];
                        const allVEvents=[];
                        for (const line of lines) {
                            const cl=line.trim();
                            if(cl.startsWith("BEGIN:VEVENT")){event={};exDates=[];}
                            else if(cl.startsWith("UID"))event.uid=cl.split(":").pop().trim();
                            else if(cl.startsWith("RECURRENCE-ID"))event.recurrenceId=cl.split(":").pop().trim();
                            else if(cl.startsWith("DTSTART"))event.start=cl.split(":").pop();
                            else if(cl.startsWith("DTEND"))event.end=cl.split(":").pop();
                            else if(cl.startsWith("RRULE:"))event.rrule=cl;
                            else if(cl.startsWith("EXDATE")){const v=cl.split(":").pop();if(v)v.split(",").forEach(dd=>exDates.push(dd.trim()));}
                            else if(cl.startsWith("SUMMARY")){event.title=cl.substring(cl.indexOf(':')+1).replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\').trim();}
                            else if(cl.startsWith("END:VEVENT")){if(event.start)allVEvents.push({...event,exDates:[...exDates]});}
                        }

                        const recIdsByUid={};
                        allVEvents.forEach(ev=>{if(ev.recurrenceId&&ev.uid){if(!recIdsByUid[ev.uid])recIdsByUid[ev.uid]=[];recIdsByUid[ev.uid].push(ev.recurrenceId);}});

                        const category = TB_CAT_MAP[colorKey]||'기타';
                        for (const ev of allVEvents) {
                            const startObj=safeParseDate(ev.start);
                            if(!startObj) continue;
                            let endObj=ev.end?safeParseDate(ev.end):null;
                            if(!endObj)endObj=new Date(startObj.getTime()+3600000);

                            if(ev.rrule&&!ev.recurrenceId){
                                const allEx=[...(ev.exDates||[])];
                                if(ev.uid&&recIdsByUid[ev.uid])allEx.push(...recIdsByUid[ev.uid]);
                                const instances=expandRRule(ev.rrule,startObj,endObj,allEx);
                                instances.forEach(inst=>{
                                    const dk=`${inst.start.getFullYear()}${String(inst.start.getMonth()+1).padStart(2,'0')}${String(inst.start.getDate()).padStart(2,'0')}`;
                                    if(dk===targetKey) results.push({title:ev.title||"",startTime:inst.start.getTime(),endTime:inst.end.getTime(),category});
                                });
                            } else {
                                const dk=`${startObj.getFullYear()}${String(startObj.getMonth()+1).padStart(2,'0')}${String(startObj.getDate()).padStart(2,'0')}`;
                                if(dk===targetKey) results.push({title:ev.title||"",startTime:startObj.getTime(),endTime:endObj.getTime(),category});
                            }
                        }
                    } catch(e){ console.warn(`Skip ${colorKey}:`,e); }
                }
                results.sort((a,b)=>a.startTime-b.startTime);
                setEvents(results);
            };

            useEffect(() => {
                if (isToday(viewDate)) loadLocalData();
                fetchCalendar();
            }, [viewDate]);

            useEffect(() => {
                // 다른 탭에서 변경 시 즉시 반영
                const handleStorage = (e) => {
                    if (e.key === 'fortressData' && isToday(viewDate)) {
                        loadLocalData();
                    }
                };
                window.addEventListener('storage', handleStorage);
                
                const localInterval = setInterval(() => {
                    if (isToday(viewDate)) loadLocalData();
                }, 3000);
                const calendarInterval = setInterval(() => {
                    fetchCalendar();
                }, 60000);
                
                return () => {
                    window.removeEventListener('storage', handleStorage);
                    clearInterval(localInterval);
                    clearInterval(calendarInterval);
                };
            }, [viewDate]);

            useEffect(() => {
                const focusBlocks = blocks.filter(b => !b.type || b.type === 'focus');
                const total = focusBlocks.reduce((acc, curr) => acc + curr.duration, 0);
                setTotalDuration(total);
            }, [blocks]);

            // 일일 피드백 가져오기
            useEffect(() => {
                // 오래된 캐시 정리 + 피드백 초기화
                const today = getTodayStr();
                try {
                    Object.keys(localStorage).forEach(key => {
                        if (key.startsWith('dailyFeedback_') && !key.includes(today)) {
                            localStorage.removeItem(key);
                        }
                    });
                } catch (e) {}

                if (!isToday(viewDate) || totalDuration === 0) {
                    setDailyFeedback('');
                    return;
                }

                const fetchDailyFeedback = async () => {
                    const cacheKey = `dailyFeedback_${today}_${totalDuration}`;
                    
                    // localStorage 캐시 확인
                    try {
                        const cached = localStorage.getItem(cacheKey);
                        if (cached) {
                            setDailyFeedback(cached);
                            return;
                        }
                    } catch (e) {}

                    // 30분 이상일 때만 API 호출 (비용 절약)
                    if (totalDuration < 30) return;

                    setFeedbackLoading(true);
                    try {
                        const activities = blocks
                            .filter(b => b.name)
                            .map(b => `${b.name}(${b.duration}분)`)
                            .slice(0, 5)
                            .join(', ');

                        const res = await fetch(FEEDBACK_WORKER_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
    stats: { totalMinutes: totalDuration, activities, currentHour: new Date().getHours() },
    date: today,
    type: 'daily'
})
                        });

                        if (res.ok) {
                            const data = await res.json();
                            setDailyFeedback(data.feedback);
                            try {
                                localStorage.setItem(cacheKey, data.feedback);
                            } catch (e) {}
                        }
                    } catch (e) {
                        console.error('Daily feedback fetch error:', e);
                    } finally {
                        setFeedbackLoading(false);
                    }
                };

                const timer = setTimeout(fetchDailyFeedback, 10000);
                return () => clearTimeout(timer);
            }, [totalDuration, viewDate, blocks]);

            const getTotalColorClass = (min) => {
                if (!min || min <= 30) return "text-white";        // 30분 이하
                if (min < 120) return "text-slate-300";              // 31분 ~ 2시간 미만 (밝은 회색)
                if (min < 240) return "text-yellow-200";           // 2시간 ~ 4시간 미만 (연노랑)
                if (min <= 360) return "text-sky-300";             // 4시간 ~ 6시간 (스카이블루)
                return "text-purple-300";                          // 6시간 초과 (연보라)
            };

            // [수정] 소수점 제거 및 반올림 적용
const formatDuration = (totalMin) => {
    // 1. 여기서 전체 시간을 반올림하여 정수로 만듭니다.
    const roundedTotal = Math.round(totalMin);

    const h = Math.floor(roundedTotal / 60);
    const m = roundedTotal % 60;
    
    // 색상 계산도 정수 기준으로 변경
    const colorClass = getTotalColorClass(roundedTotal);

    return (
        <span className={`font-mono-nums ${colorClass} transition-colors duration-500`}>
            <span className="text-2xl font-bold">{h}</span>
            <span className="text-[12px] mx-0.5 opacity-60 font-bold">H</span>
            {/* 문자열 변환 시 정수가 보장됨 */}
            <span className="text-2xl font-bold">{String(m).padStart(2, '0')}</span>
            <span className="text-[12px] ml-0.5 opacity-60 font-bold">M</span>
        </span>
    );
};

            const getMessage = (min) => {
                const now = new Date();
                const currentHour = now.getHours();
                const stableIdx = now.getDate() % 3; 

                if (currentHour >= 13 && min === 0) {
                    const msgs = [
                        { main: "🧊 아직 시작 전.", sub: "지금 첫 블록을 쌓아보세요." },
                        { main: "❄️ 시작이 반.", sub: "가볍게 책상에 앉아볼까요?" },
                        { main: "🕰️ 늦지 않았어요.", sub: "지금 출발하면 충분합니다." }
                    ];
                    return msgs[stableIdx];
                }

                if (min === 0) return { main: "❄️ 준비 되셨나요?", sub: "차근차근 점화를 시작해 봅시다." };
                
                if (min < 60) {
                    return [{ main: "🌱 의미 있는 시작.", sub: "가볍게 리듬을 타보세요." }, { main: "✨ 첫 단추 완성.", sub: "시스템이 가동 중입니다." }, { main: "🧊 차분한 출발.", sub: "이대로만 쭉 가면 됩니다." }][stableIdx];
                }
                if (min < 180) {
                    return [{ main: "🧱 견고한 시간.", sub: "흔들리지 않는 모습이 멋져요." }, { main: "☁️ 훌륭한 페이스.", sub: "무던하게 계속 나아가세요." }, { main: "⚖️ 균형 잡힌 몰입.", sub: "아주 잘하고 있습니다." }][stableIdx];
                }
                if (min < 300) {
                    return [{ main: "🔥 뜨거운 몰입.", sub: "충분히 훌륭한 하루예요." }, { main: "💎 대단한 집중력.", sub: "오늘 하루, 빛나고 있습니다." }, { main: "🚀 한계 돌파 중.", sub: "당신의 노력이 쌓입니다." }][stableIdx];
                }
                return [{ main: "🎖️ 성취의 하루.", sub: "충분했으니, 휴식을 권해요." }, { main: "🌌 경이로운 기록.", sub: "이제 편안히 쉬어도 됩니다." }, { main: "🌙 치열했던 끝.", sub: "스스로를 칭찬해 주세요." }][stableIdx];
            };

            const renderGrid = () => {
                const hours = Array.from({length: 18}, (_, i) => i + 6);

                const roundTime = (ts) => {
                    const d = new Date(ts);
                    const m = d.getMinutes();
                    const roundedM = Math.round(m / 10) * 10; 
                    d.setMinutes(roundedM); d.setSeconds(0); d.setMilliseconds(0);
                    return d.getTime();
                };

                return hours.map(hour => {
                    const slots = Array.from({length: 6}, (_, i) => {
                        const slotStartMin = i * 10;
                        const slotEndMin = (i + 1) * 10;
                        
                        const slotStartTime = new Date(viewDate); 
                        slotStartTime.setHours(hour, slotStartMin, 0, 0);
                        const slotStartTs = slotStartTime.getTime();
                        
                        let isBeforeWakeUp = false;
                        let isWakeUpSlot = false;
                        let isAfterBedTime = false;

                        // 1. 기상 시간 체크
                        if (wakeUpTime) {
                            const [wH, wM] = wakeUpTime.split(':').map(Number);
                            const wakeUpDate = new Date(viewDate); 
                            wakeUpDate.setHours(wH, wM, 0, 0);
                            const wakeUpTs = wakeUpDate.getTime();
                            
                            // 기상 시간 이전인지 체크
                            if (slotStartTs < wakeUpTs) isBeforeWakeUp = true;
                            
                            // [중요] 기상한 딱 그 시간대 블록은 투명화 방지 (네가 찾은 코드)
                            const slotEndTimeTmp = slotStartTs + 10 * 60 * 1000;
                            if (wakeUpTs > slotStartTs && wakeUpTs <= slotEndTimeTmp) { 
                                isWakeUpSlot = true; 
                                isBeforeWakeUp = false; 
                            }
                        }

                        // 2. 취침 시간 체크 (이제 기상 시간과 상관없이 독립적으로 작동)
                        if (bedTime) {
                            const [bH, bM] = bedTime.split(':').map(Number);
                            const bedDate = new Date(viewDate); 
                            bedDate.setHours(bH, bM, 0, 0);
                            
                            if (slotStartTs >= bedDate.getTime()) isAfterBedTime = true;
                        }

                        const slotEndTime = new Date(viewDate);
                        slotEndTime.setHours(hour, slotEndMin, 0, 0);
                        const slotEndTs = slotEndTime.getTime();
                        
                        const bgBlock = blocks.find(b => {
                            if (b.type !== 'focus' && b.type) return false; 
                            const roundedStart = roundTime(b.startTime);
                            const roundedEnd = roundTime(b.endTime);
                            const finalEnd = (roundedStart === roundedEnd) ? roundedEnd + (10 * 60 * 1000) : roundedEnd;
                            return slotStartTs >= roundedStart && slotStartTs < finalEnd;
                        });

                        const rangeIconBlock = blocks.find(b => {
                            if (b.type === 'focus' || !b.type) return false;
                            if (!b.duration || b.duration <= 10) return false;
                            const roundedStart = roundTime(b.startTime);
                            const roundedEnd = roundedStart + (b.duration * 60 * 1000); 
                            return slotStartTs >= roundedStart && slotStartTs < roundedEnd;
                        });

                        const pointIconBlock = blocks.find(b => {
                            if (b.type === 'focus' || !b.type) return false;
                            if (b.duration > 10) return false; 
                            return b.endTime > slotStartTs && b.endTime <= slotEndTs;
                        });

                        const slotCenter = slotStartTs + (5 * 60 * 1000); 
                        const calendarEvent = events.find(ev => ev.startTime <= slotCenter && ev.endTime >= slotCenter);

                        let cellClass = 'block-empty';
                        let content = null;
                        let lineOverlay = null;

                        if ((isBeforeWakeUp || isAfterBedTime) && !bgBlock && !isWakeUpSlot && !rangeIconBlock) {
                            cellClass = 'opacity-0';
                        }
                        else if (bgBlock) {
                            if (bgBlock.quality === 'Sun') cellClass = 'block-sun';
                            else if (bgBlock.quality === 'Cloud') cellClass = 'block-cloud';
                            else cellClass = 'block-rain';
                        } 
                        else if (rangeIconBlock) {
                            cellClass = 'block-action-bg'; 
                            const roundedStart = roundTime(rangeIconBlock.startTime);
                            const totalSlots = Math.ceil(rangeIconBlock.duration / 10);
                            const currentIndex = Math.floor((slotStartTs - roundedStart) / (10 * 60 * 1000));
                            const iconIndex = Math.floor((totalSlots - 1) / 2);
                            const color = rangeIconBlock.color || 'text-white';
                            if (!cellClass.includes('flex')) cellClass += ' relative flex items-center justify-center';

                            if (currentIndex === iconIndex) {
                                const IconComp = Icons[rangeIconBlock.icon] || (rangeIconBlock.type === 'switch' ? Icons.Zap : Icons.Zzz);
                                content = <IconComp className={`w-3.5 h-3.5 ${color} relative z-10 drop-shadow-md`} />;
                            } else {
                                content = <span className={`text-[10px] leading-none ${color} opacity-60 relative z-10 pb-[1px]`}>⊹</span>;
                            }
                        }
                        else if (pointIconBlock) {
                            cellClass = 'block-action-bg';
                            const IconComp = Icons[pointIconBlock.icon] || (pointIconBlock.type === 'switch' ? Icons.Zap : Icons.Zzz);
                            const iconColor = pointIconBlock.color || 'text-white';
                            if (!cellClass.includes('flex')) cellClass += ' relative flex items-center justify-center';
                            content = <IconComp className={`w-4 h-4 ${iconColor} relative z-10 drop-shadow-md`} />;
                        }

                        if (calendarEvent) {
                            const category = calendarEvent.category || 'default';
                            const colorClass = categoryColors[category] || categoryColors['default'];
                            
                            // [수정] 가로선 -> 중앙 정렬된 세로선으로 변경
                            // h-full: 높이를 꽉 채움
                            // w-[3px]: 두께 설정 (취향에 따라 2px~4px 조절)
                            // left-1/2 -translate-x-1/2: 정확히 중앙에 위치
                            lineOverlay = (
                                <div className={`absolute h-full w-[3px] left-1/2 -translate-x-1/2 top-0 z-20 ${colorClass}`} title={calendarEvent.title} />
                            );

                            if (!content && !bgBlock && !rangeIconBlock) {
                                cellClass += ' relative'; 
                            }
                        }

                        const isNowSlot = viewIsToday && hour === nowHour && i === nowSlot;

                        return (
                            <div key={i} className={`time-block ${cellClass}`}>
                                {lineOverlay}
                                {content}
                                {isNowSlot && <div className="now-indicator" style={{top: `${(nowMinInSlot / 10) * 100}%`}} />}
                            </div>
                        )
                    });

                    return (
                        <div key={hour} className="hour-column group">
                            <div className="time-label group-hover:text-white transition-colors">{String(hour).padStart(2,'0')}</div>
                            {slots}
                        </div>
                    );
                });
            };

            const msg = getMessage(totalDuration);

            return (
                <div className="widget-container">
                    {/* [좌측 패널 수정] TOTAL 삭제, H M 상단 배치, 글자 크기 축소 */}
                    <div className="left-panel">
                        <div className="-mt-1.5 text-center">
                             {formatDuration(totalDuration)}
                        </div>
                        <div className="mb-6 text-center">
                            {feedbackLoading ? (
                                <p className="text-[10px] text-white/60">피드백 생성 중...</p>
                            ) : dailyFeedback ? (
                    <p className="text-[11px] text-white leading-tight break-keep">{dailyFeedback}</p>
                            ) : (
                                <>
                                    <p className="text-[12px] font-bold text-white leading-snug drop-shadow-md mb-0.5">{msg.main}</p>
                                    <p className="text-[10px] text-sky-200 leading-tight opacity-80 break-keep">{msg.sub}</p>
                                </>
                            )}
                        </div>
                    </div>

                    {/* [여기 추가] 2. 세로 분 단위 라벨 */}
        <div className="minute-scale-col">
            {['00', '10', '20', '30', '40', '50'].map((min, idx) => (
                <div key={idx} className="minute-label-item">
                    {min}
                </div>
            ))}
        </div>

                    <div className="timeline-area">
                        <div className="grid-container">{renderGrid()}</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
