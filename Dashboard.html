<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="color-scheme" content="dark light">
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background-color: transparent; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        ::-webkit-scrollbar { display: none; }

        .widget-container {
            position: relative; width: 440px; height: 360px;
            background: linear-gradient(180deg, rgba(224,242,254,0.25) 0%, rgba(240,249,255,0.15) 100%);
            backdrop-filter: blur(25px); border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 32px rgba(186,230,253,0.15), inset 0 0 20px rgba(255,255,255,0.2);
            display: flex; flex-direction: column; overflow: hidden; color: #334155;
        }

        .glass-header { background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }
        .glass-footer { background: rgba(255,255,255,0.08); backdrop-filter: blur(5px); border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }

        .compact-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .heatmap-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 3px; font-size: 9px; font-family: 'Roboto Mono', monospace; cursor: pointer; transition: all 0.2s; position: relative; }

        /* Focus heatmap colors */
        .heat-0 { background: rgba(255,255,255,0.03); color: #64748b; }
        .heat-start { background: rgba(148,163,184,0.3); border: 0.5px solid rgba(148,163,184,0.2); }
        .heat-1 { background: rgba(254,240,138,0.45); border: 0.5px solid rgba(254,240,138,0.2); }
        .heat-2 { background: rgba(125,211,252,0.6); border: 0.5px solid rgba(125,211,252,0.4); }
        .heat-3 { background: rgba(216,180,254,0.7); font-weight: 700; border: 0.5px solid rgba(216,180,254,0.4); }

        /* Exercise heatmap colors - 3 purple levels */
        .ex-0 { background: rgba(255,255,255,0.03); }
        .ex-1 { background: rgba(216,180,254,0.3); border: 0.5px solid rgba(216,180,254,0.15); }
        .ex-2 { background: rgba(216,180,254,0.55); border: 0.5px solid rgba(216,180,254,0.3); }
        .ex-3 { background: rgba(192,132,252,0.75); border: 0.5px solid rgba(192,132,252,0.4); font-weight: 700; }

        .day-today { border: 1.5px solid #ffffff !important; box-shadow: 0 0 6px rgba(255,255,255,0.4); z-index: 10; }
        .heatmap-tooltip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 4px; background: rgba(0,0,0,0.9); padding: 2px 6px; border-radius: 4px; font-size: 9px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 20; border: 1px solid rgba(255,255,255,0.1); color: white; }
        .heatmap-cell:hover .heatmap-tooltip { opacity: 1; }

        .nav-btn { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: rgba(255,255,255,0.4); transition: all 0.2s; background: transparent; border: none; cursor: pointer; }
        .nav-btn:hover { color: white; background: rgba(255,255,255,0.1); }

        .stat-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }

        .prog-row { display: flex; align-items: center; gap: 6px; }
        .prog-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.5); width: 20px; text-align: right; flex-shrink: 0; }
        .prog-track { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .prog-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; background: linear-gradient(90deg, rgba(216,180,254,0.6), rgba(192,132,252,0.8)); }
        .prog-val { font-size: 9px; font-weight: 600; color: rgba(216,180,254,0.8); width: 46px; text-align: right; flex-shrink: 0; font-family: 'Roboto Mono', monospace; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LOG_WORKER_URL = "https://log-worker.moonkelly601.workers.dev";
        const FEEDBACK_WORKER_URL = "https://feedback-worker.moonkelly601.workers.dev";

        const IconChevronLeft = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>;
        const IconChevronRight = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;
        const IconMessage = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const IconDumbbell = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>;

        const fmtYMD = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const getTodayStr = () => { const n=new Date(); return fmtYMD(n.getFullYear(),n.getMonth()+1,n.getDate()); };
        const getMonthStr = () => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; };
        const getWeekDates = () => {
            const now=new Date(), day=now.getDay(), sun=new Date(now);
            sun.setDate(now.getDate()-day); sun.setHours(0,0,0,0);
            const dates=[];
            for(let i=0;i<7;i++){ const d=new Date(sun); d.setDate(sun.getDate()+i); if(d<=now) dates.push(fmtYMD(d.getFullYear(),d.getMonth()+1,d.getDate())); }
            return dates;
        };

        const extractMinutes = (data) => {
            if(!data) return 0;
            if(typeof data.Total==='number') return data.Total;
            if(typeof data.total==='number') return data.total;
            const blocks = Array.isArray(data)?data:(data.blocks||[]);
            return blocks.filter(b=>b.type==='focus'||!b.type).reduce((a,c)=>a+(c.duration||0),0);
        };

        const extractExerciseMinutes = (blocks) => {
            let total = 0;
            (blocks||[]).forEach(b => {
                const c = ((b.name||"")+" "+(b.memo||"")).toLowerCase();
                const d = b.duration || 0;
                if ((c.includes("산책")||c.includes("운동")||c.includes("러닝")||c.includes("스트레칭")||c.includes("헬스")) && d >= 5) total += d;
            });
            return total;
        };

        const Dashboard = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [focusData, setFocusData] = useState({});
            const [exerciseData, setExerciseData] = useState({});
            const [weeklyExDays, setWeeklyExDays] = useState(0);
            const [weeklyExMin, setWeeklyExMin] = useState(0);
            const [monthlyExDays, setMonthlyExDays] = useState(0);
            const [monthlyExMin, setMonthlyExMin] = useState(0);
            const [todayExMin, setTodayExMin] = useState(0);
            const [feedback, setFeedback] = useState('');
            const [feedbackLoading, setFeedbackLoading] = useState(false);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const startDay = new Date(year, month, 1).getDay();
            const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            const totalCells = 42;

            // Load data
            useEffect(() => {
                const load = async () => {
                    const fMap = {}, exMap = {};

                    // Local data
                    try {
                        const hist=JSON.parse(localStorage.getItem('fortressHistory')||'[]');
                        hist.forEach(day=>{if(day.date){const d=new Date(day.date); const k=fmtYMD(d.getFullYear(),d.getMonth()+1,d.getDate()); fMap[k]=extractMinutes(day); exMap[k]=extractExerciseMinutes(day.blocks||[]);}});
                        const td=JSON.parse(localStorage.getItem('fortressData')||'{}');
                        if(td.date){const d=new Date(td.date); const k=fmtYMD(d.getFullYear(),d.getMonth()+1,d.getDate()); fMap[k]=extractMinutes(td); exMap[k]=extractExerciseMinutes(td.blocks||[]);}
                    } catch(e){}

                    // Server data
                    try {
                        const ms=`${year}-${String(month+1).padStart(2,'0')}`;
                        const res=await fetch(`${LOG_WORKER_URL}?month=${ms}`);
                        if(res.ok){
                            const result=await res.json();
                            if(result.data){
                                Object.keys(result.data).forEach(day=>{
                                    const dd=result.data[day], dk=fmtYMD(year,month+1,parseInt(day));
                                    if(dd.blocks&&Array.isArray(dd.blocks)){
                                        const mins=extractMinutes(dd); if(mins>0) fMap[dk]=mins;
                                        const exMin=extractExerciseMinutes(dd.blocks); exMap[dk]=exMin;
                                    }
                                });
                            }
                        }
                    } catch(e){}

                    setFocusData(prev=>{const m={...prev}; Object.keys(fMap).forEach(k=>{if(fMap[k]>0)m[k]=fMap[k];}); return m;});
                    setExerciseData(prev=>{const m={...prev}; Object.keys(exMap).forEach(k=>{m[k]=exMap[k];}); return m;});

                    // Weekly exercise stats
                    const weekDates = getWeekDates();
                    let wDays=0, wMin=0;
                    weekDates.forEach(d => { const m=exMap[d]||0; if(m>=10){wDays++;} wMin+=m; });
                    setWeeklyExDays(wDays); setWeeklyExMin(wMin);

                    // Monthly exercise stats
                    let mDays=0, mMin=0;
                    for(let d=1;d<=daysInMonth;d++){
                        const dk=fmtYMD(year,month+1,d);
                        const m=exMap[dk]||0; if(m>=10){mDays++;} mMin+=m;
                    }
                    setMonthlyExDays(mDays); setMonthlyExMin(mMin);

                    // Today exercise
                    const todayKey = getTodayStr();
                    setTodayExMin(exMap[todayKey] || 0);
                };
                load();
                const iv=setInterval(load,60000);
                return ()=>clearInterval(iv);
            }, [currentDate]);

            // Feedback
            useEffect(() => {
                const fetchFb = async () => {
                    const today = getTodayStr();
                    const h = new Date().getHours();
                    const period = h < 6 ? 'dawn' : h < 12 ? 'morning' : h < 18 ? 'afternoon' : 'evening';
                    const cacheKey = `dashFb_${today}_${period}_${todayExMin}_${weeklyExDays}_${monthlyExDays}`;
                    try{ Object.keys(localStorage).forEach(k=>{if(k.startsWith('dashFb_')&&k!==cacheKey)localStorage.removeItem(k);}); }catch(e){}
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) { setFeedback(cached); return; }

                    setFeedbackLoading(true);
                    try {
                        const res = await fetch(FEEDBACK_WORKER_URL, {
                            method:'POST', headers:{'Content-Type':'application/json'},
                            body: JSON.stringify({
                                stats: { todayExMin, weeklyExDays, weeklyExMin, monthlyExDays, monthlyExMin, currentHour: h },
                                date: today, type: 'exercise', period
                            })
                        });
                        if(res.ok){ const data=await res.json(); setFeedback(data.feedback); localStorage.setItem(cacheKey, data.feedback); }
                        else setFeedback(weeklyExDays === 0 ? '오늘 10분만 움직여보자.' : `이번 주 ${weeklyExDays}회 운동 중!`);
                    } catch(e) { setFeedback(''); }
                    finally { setFeedbackLoading(false); }
                };
                fetchFb();
            }, [todayExMin, weeklyExDays, monthlyExDays]);

            const currentMonthTotal = useMemo(() => {
                let t=0; Object.keys(focusData).forEach(k=>{const [y,m]=k.split('-').map(Number); if(y===year&&m===month+1) t+=focusData[k];}); return t;
            }, [focusData, currentDate]);

            const prevMonth = ()=>setCurrentDate(new Date(year,month-1,1));
            const nextMonth = ()=>setCurrentDate(new Date(year,month+1,1));

            const getHeatClass = (m)=>{ if(!m||m<=30)return 'heat-0'; if(m<120)return 'heat-start'; if(m<=240)return 'heat-1'; if(m<=360)return 'heat-2'; return 'heat-3'; };
            const getExClass = (m)=>{ if(!m||m<10)return 'ex-0'; if(m<=30)return 'ex-1'; if(m<=60)return 'ex-2'; return 'ex-3'; };
            const formatTime = (m)=>{const h=Math.floor(m/60),mn=m%60; return h>0?`${h}H ${mn}M`:`${mn}M`;};

            const renderCells = (renderFn) => {
                return Array.from({length:totalCells}).map((_,i)=>{
                    const dn=i-startDay+1, isCur=dn>0&&dn<=daysInMonth;
                    if(!isCur) return <div key={i} style={{aspectRatio:'1'}}></div>;
                    const dk=fmtYMD(year,month+1,dn);
                    const isToday=new Date().toDateString()===new Date(year,month,dn).toDateString();
                    return renderFn(i,dn,dk,isToday);
                });
            };

            return (
                <div className="widget-container">
                    {/* Header */}
                    <div className="glass-header px-4 py-1.5 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <button onClick={prevMonth} className="nav-btn"><IconChevronLeft/></button>
                            <span className="text-sm font-bold text-white">{monthNames[month]} {year}</span>
                            <button onClick={nextMonth} className="nav-btn"><IconChevronRight/></button>
                        </div>
                        <span className="text-[11px] font-bold text-white tracking-tight">신체 주도권 회복</span>
                    </div>

                    {/* Exercise block-bar progress */}
                    <div className="px-4 py-2 flex flex-col gap-1.5" style={{background:'rgba(255,255,255,0.05)', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
                        {[
                            { label: '오늘', current: todayExMin, target: 30 },
                            { label: '주간', current: weeklyExMin, target: 150 },
                            { label: '월간', current: monthlyExMin, target: 600 },
                        ].map(({label, current, target}) => {
                            const pct = Math.min(100, Math.round((current / target) * 100));
                            const filled = Math.round((pct / 100) * 10);
                            const fmtV = (m) => m >= 60 ? `${Math.floor(m/60)}H${m%60 > 0 ? ` ${m%60}M` : ''}` : `${m}M`;
                            return (
                                <div key={label} className="flex items-center gap-2">
                                    <span style={{fontSize:'9px',fontWeight:700,color:'rgba(255,255,255,0.5)',width:'24px',textAlign:'right',flexShrink:0}}>{label}</span>
                                    <div style={{display:'flex',gap:'3px',flex:1}}>
                                        {[...Array(10)].map((_,i) => (
                                            <div key={i} style={{flex:1,height:'10px',borderRadius:'2.5px',background:i<filled?'rgba(192,132,252,0.7)':'rgba(255,255,255,0.08)',boxShadow:i<filled?'0 0 4px rgba(192,132,252,0.3)':'none',transition:'all 0.3s'}}/>
                                        ))}
                                    </div>
                                    <span style={{fontSize:'9px',fontWeight:700,color:'white',width:'52px',textAlign:'right',flexShrink:0,fontFamily:'Roboto Mono,monospace'}}>{fmtV(current)}/{fmtV(target)}</span>
                                </div>
                            );
                        })}
                    </div>

                    {/* Two mini heatmaps */}
                    <div className="flex min-h-0 px-3 pt-1.5 pb-1" style={{gap:'8px'}}>
                        {/* Focus */}
                        <div className="flex-1 flex flex-col">
                            <div className="flex items-center justify-between mb-1 px-0.5">
                                <span style={{fontSize:'8px',fontWeight:700,color:'rgba(255,255,255,0.45)',letterSpacing:'0.5px'}}>집중시간</span>
                                <span style={{fontSize:'8px',fontWeight:700,color:'white',fontFamily:'Roboto Mono,monospace'}}>{Math.floor(currentMonthTotal/60)}H {currentMonthTotal%60}M</span>
                            </div>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'1.5px'}}>
                                {Array.from({length:totalCells}).map((_,i)=>{
                                    const dn=i-startDay+1, isCur=dn>0&&dn<=daysInMonth;
                                    if(!isCur) return <div key={i} style={{height:'11px'}}/>;
                                    const dk=fmtYMD(year,month+1,dn);
                                    const isToday=new Date().toDateString()===new Date(year,month,dn).toDateString();
                                    const mins=focusData[dk]||0;
                                    const cls=getHeatClass(mins);
                                    return (<div key={i} className={`${cls} ${isToday?'day-today':''}`} style={{height:'11px',borderRadius:'2px',position:'relative',cursor:'pointer'}}>
                                        {mins>0 && <div className="heatmap-tooltip">{dn}일 {formatTime(mins)}</div>}
                                    </div>);
                                })}
                            </div>
                            <div className="flex items-center gap-1 mt-1 px-0.5">
                                {[{cls:'heat-start',l:'~2H'},{cls:'heat-1',l:'2-4H'},{cls:'heat-2',l:'4-6H'},{cls:'heat-3',l:'6H+'}].map((x,i)=>(
                                    <div key={i} className="flex items-center gap-0.5">
                                        <div className={`${x.cls}`} style={{width:'6px',height:'6px',borderRadius:'1.5px'}}/>
                                        <span style={{fontSize:'6px',color:'rgba(255,255,255,0.25)',fontFamily:'Roboto Mono,monospace'}}>{x.l}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div style={{width:'1px',background:'rgba(255,255,255,0.08)'}}/>

                        {/* Exercise */}
                        <div className="flex-1 flex flex-col">
                            <div className="flex items-center justify-between mb-1 px-0.5">
                                <span style={{fontSize:'8px',fontWeight:700,color:'rgba(255,255,255,0.45)',letterSpacing:'0.5px'}}>운동</span>
                                <span style={{fontSize:'8px',fontWeight:700,color:'white',fontFamily:'Roboto Mono,monospace'}}>{monthlyExMin > 0 ? `${Math.floor(monthlyExMin/60)}H ${monthlyExMin%60}M` : '0M'}</span>
                            </div>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'1.5px'}}>
                                {Array.from({length:totalCells}).map((_,i)=>{
                                    const dn=i-startDay+1, isCur=dn>0&&dn<=daysInMonth;
                                    if(!isCur) return <div key={i} style={{height:'11px'}}/>;
                                    const dk=fmtYMD(year,month+1,dn);
                                    const isToday=new Date().toDateString()===new Date(year,month,dn).toDateString();
                                    const mins=exerciseData[dk]||0;
                                    const cls=getExClass(mins);
                                    return (<div key={i} className={`${cls} ${isToday?'day-today':''}`} style={{height:'11px',borderRadius:'2px',position:'relative',cursor:'pointer'}}>
                                        {mins>=10 && <div className="heatmap-tooltip">{dn}일 {formatTime(mins)}</div>}
                                    </div>);
                                })}
                            </div>
                            <div className="flex items-center gap-1 mt-1 px-0.5">
                                {[{cls:'ex-1',l:'~30M'},{cls:'ex-2',l:'31-60M'},{cls:'ex-3',l:'60M+'}].map((x,i)=>(
                                    <div key={i} className="flex items-center gap-0.5">
                                        <div className={`${x.cls}`} style={{width:'6px',height:'6px',borderRadius:'1.5px'}}/>
                                        <span style={{fontSize:'6px',color:'rgba(255,255,255,0.25)',fontFamily:'Roboto Mono,monospace'}}>{x.l}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Feedback - expanded */}
                    <div className="glass-footer px-4 py-2.5 flex items-start gap-2.5" style={{flex:'1',minHeight:'60px'}}>
                        <IconMessage className="w-4 h-4 shrink-0 mt-0.5" />
                        <p className="text-[11px] text-white leading-relaxed">{feedbackLoading ? '피드백 생성 중...' : (feedback || '데이터 수집 중...')}</p>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
    </script>
</body>
</html>
